<!DOCTYPE html>
<html class="dark" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7c5cfc",
                        "background-light": "#f8f6f6",
                        "background-dark": "#050508",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                    },
                },
            },
        }

    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .canvas-container {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
        }

        .flex-visualizer {
            background: rgba(5, 5, 8, 0.5);
            border-radius: 8px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            width: 100%;
            height: 100%;
            min-height: 400px;
            display: flex;
            position: relative;
            padding: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flex-item {
            background: linear-gradient(135deg, #7c5cfc 0%, #a855f7 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 16px rgba(124, 92, 252, 0.3);
            min-width: 80px;
            min-height: 80px;
            cursor: pointer;
        }

        .flex-item:hover {
            transform: scale(1.05) translateY(-2px);
        }

        input[type="number"],
        select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8f6f6;
            outline: none;
        }

        select option {
            background: #050508;
        }

        input:focus,
        select:focus {
            border-color: #7c5cfc;
        }
    </style>
    <link rel="canonical" href="https://www.studiolimb.com/flexbox-playground.html">
    <meta name="description" content="Générateur interactif Flexbox pour la conception web. Ajustez les propriétés visuellement.">
    <link rel="alternate" hreflang="x-default" href="https://www.studiolimb.com/flexbox-playground.html" />
    <link rel="alternate" hreflang="en" href="https://www.studiolimb.com/flexbox-playground.html" />
    <link rel="alternate" hreflang="es" href="https://www.studiolimb.com/es/flexbox-playground.html" />
    <link rel="alternate" hreflang="fr" href="https://www.studiolimb.com/fr/flexbox-playground.html" />
    <link rel="alternate" hreflang="hi" href="https://www.studiolimb.com/hi/flexbox-playground.html" />
    <link rel="alternate" hreflang="pt-BR" href="https://www.studiolimb.com/pt/flexbox-playground.html" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://studiolimb.com/fr/flexbox-playground.html" />
    <meta property="og:title" content="CSS Flexbox Playground — Interactive Visual Builder" />
    <meta property="og:description" content="Master CSS Flexbox with a real-time visual playground. Adjust properties and copy the generated CSS instantly." />
    <meta property="og:site_name" content="StudioLimb" />
    <meta property="og:locale" content="fr_FR" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CSS Flexbox Playground — Interactive Visual Builder" />
    <meta name="twitter:description" content="Master CSS Flexbox with a real-time visual playground. Adjust properties and copy the generated CSS instantly." />
    <meta name="twitter:site" content="@studiolimb" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "CSS Flexbox Playground",
      "description": "Master CSS Flexbox with a real-time visual playground. Adjust properties and copy the generated CSS instantly.",
      "url": "https://studiolimb.com/fr/flexbox-playground.html",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "All",
      "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"},
      "featureList": "flexbox playground, css flexbox, flexbox generator, css layout tool"
    }

</head>

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col">
        <!-- Main Background Canvas -->
        <div class="absolute inset-0 z-0 canvas-container"></div>

        <!-- Top Navigation Bar -->
        <header class="relative z-20 flex items-center justify-between px-6 py-4 glass-panel m-4 rounded-xl shadow-2xl">
            <div class="flex items-center gap-3">
                <div
                    class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined">flex_direction</span>
                </div>
                <div>
                    <h2 class="text-lg font-bold leading-tight tracking-tight">StudioLimb</h2>
                    <p class="text-[10px] uppercase tracking-widest font-semibold opacity-60">Creative Suite</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button id="btnCopy"
                    class="flex h-10 px-6 items-center justify-center rounded-xl bg-primary text-white text-sm font-bold shadow-lg shadow-primary/25 hover:opacity-90 transition-all gap-2"
                    onclick="copyCode()">
                    <span class="material-symbols-outlined text-[18px]">content_copy</span> Copier CSS
                </button>
            </div>
        </header>

        <main class="relative z-10 flex flex-1 overflow-hidden px-4 pb-4 gap-6">

            <!-- Sidebar Controls -->
            <div class="flex w-96 flex-col gap-4 h-full">
                <div class="flex flex-col gap-4 glass-panel p-5 rounded-xl">
                    <div>
                        <h1 class="text-xl font-bold">Flexbox Gen</h1>
                        <p class="text-sm font-medium text-slate-400">Layout Builder <span
                                class="text-primary">Premier</span></p>
                    </div>
                </div>

                <div class="flex flex-1 flex-col glass-panel p-5 rounded-xl overflow-y-auto scrollbar-hide space-y-6">

                    <div class="grid grid-cols-2 gap-3">
                        <button
                            class="bg-primary text-white text-xs font-bold py-2.5 rounded-lg shadow-lg shadow-primary/20 hover:opacity-90 transition-opacity"
                            onclick="addItem()">+ Ajouter un Item</button>
                        <button
                            class="bg-white/5 border border-white/10 text-slate-300 text-xs font-bold py-2.5 rounded-lg hover:border-red-400 hover:text-red-400 transition-colors"
                            onclick="removeItem()">- Supprimer</button>
                    </div>

                    <div class="space-y-4 pt-4 border-t border-white/5">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Flex
                                Direction</label>
                            <select id="flexDirection"
                                class="w-full rounded-lg px-3 py-2 text-sm transition-colors focus:ring-1 focus:ring-primary h-10"
                                onchange="updateFlex()">
                                <option value="row">row</option>
                                <option value="row-reverse">row-reverse</option>
                                <option value="column">column</option>
                                <option value="column-reverse">column-reverse</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Justify
                                Content</label>
                            <select id="justifyContent"
                                class="w-full rounded-lg px-3 py-2 text-sm transition-colors focus:ring-1 focus:ring-primary h-10"
                                onchange="updateFlex()">
                                <option value="flex-start">flex-start</option>
                                <option value="center">center</option>
                                <option value="flex-end">flex-end</option>
                                <option value="space-between">space-between</option>
                                <option value="space-around">space-around</option>
                                <option value="space-evenly">space-evenly</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Align
                                Items</label>
                            <select id="alignItems"
                                class="w-full rounded-lg px-3 py-2 text-sm transition-colors focus:ring-1 focus:ring-primary h-10"
                                onchange="updateFlex()">
                                <option value="stretch">stretch</option>
                                <option value="flex-start">flex-start</option>
                                <option value="center" selected>center</option>
                                <option value="flex-end">flex-end</option>
                                <option value="baseline">baseline</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Flex
                                Wrap</label>
                            <select id="flexWrap"
                                class="w-full rounded-lg px-3 py-2 text-sm transition-colors focus:ring-1 focus:ring-primary h-10"
                                onchange="updateFlex()">
                                <option value="nowrap">nowrap</option>
                                <option value="wrap">wrap</option>
                                <option value="wrap-reverse">wrap-reverse</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Gap
                                (px)</label>
                            <input type="number" id="gap" value="20" min="0" max="100"
                                class="w-full rounded-lg px-3 py-2 text-sm transition-colors focus:ring-1 focus:ring-primary h-10"
                                oninput="updateFlex()">
                        </div>
                    </div>

                </div>
            </div>

            <!-- Central Content Stage -->
            <div class="flex-1 glass-panel rounded-xl flex flex-col relative overflow-hidden p-6">
                <!-- Visualizer -->
                <div
                    class="flex-1 w-full bg-[#050508]/50 rounded-xl overflow-hidden shadow-inner border border-white/5">
                    <div class="flex-visualizer" id="flexContainer">
                        <div class="flex-item">1</div>
                        <div class="flex-item">2</div>
                        <div class="flex-item">3</div>
                    </div>
                </div>

                <!-- Floating code view at bottom -->
                <div
                    class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-[#0b0b12]/90 backdrop-blur-md border border-white/10 rounded-xl p-4 font-mono text-sm max-h-32 overflow-y-auto text-slate-300 shadow-2xl z-20 min-w-[300px]">
                    <pre id="codeOutput" class="m-0 leading-relaxed"><span class="text-primary">.container</span> {
  <span class="text-emerald-400">display</span>: flex;
}</pre>
                </div>
            </div>

        </main>
    </div>

    <script>
        const container = document.getElementById('flexContainer');
        const codeOutput = document.getElementById('codeOutput');

        function updateFlex() {
            const direction = document.getElementById('flexDirection').value;
            const justify = document.getElementById('justifyContent').value;
            const align = document.getElementById('alignItems').value;
            const wrap = document.getElementById('flexWrap').value;
            const gap = document.getElementById('gap').value;

            container.style.flexDirection = direction;
            container.style.justifyContent = justify;
            container.style.alignItems = align;
            container.style.flexWrap = wrap;
            container.style.gap = `${gap}px`;

            updateCode(direction, justify, align, wrap, gap);
        }

        function updateCode(direction, justify, align, wrap, gap) {
            const code = `<span class="text-primary">.container</span> {
  <span class="text-emerald-400">display</span>: flex;
  <span class="text-emerald-400">flex-direction</span>: ${direction};
  <span class="text-emerald-400">justify-content</span>: ${justify};
  <span class="text-emerald-400">align-items</span>: ${align};
  <span class="text-emerald-400">flex-wrap</span>: ${wrap};
  <span class="text-emerald-400">gap</span>: ${gap}px;
}`;
            codeOutput.innerHTML = code;
        }

        function addItem() {
            const currentCount = container.children.length;
            if (currentCount >= 20) return;
            const item = document.createElement('div');
            item.className = 'flex-item';
            item.innerText = currentCount + 1;
            container.appendChild(item);
            updateFlex();
        }

        function removeItem() {
            if (container.children.length > 1) {
                container.removeChild(container.lastElementChild);
                updateFlex();
            }
        }

        function copyCode() {
            const temp = document.createElement('div');
            temp.innerHTML = codeOutput.innerHTML;
            const cleanText = temp.textContent || temp.innerText || "";
            navigator.clipboard.writeText(cleanText).then(() => {
                const btn = document.getElementById('btnCopy');
                const origHtml = btn.innerHTML;
                btn.innerHTML = `<span class="material-symbols-outlined text-[18px]">check</span> Copied!`;
                btn.classList.add('bg-emerald-500', 'shadow-emerald-500/25');
                btn.classList.remove('bg-primary', 'shadow-primary/25');
                setTimeout(() => {
                    btn.innerHTML = origHtml;
                    btn.classList.remove('bg-emerald-500', 'shadow-emerald-500/25');
                    btn.classList.add('bg-primary', 'shadow-primary/25');
                }, 2000);
            });
        }

        updateFlex();
    </script>
    <script src="../shared.js"></script>
</body>

</html>
