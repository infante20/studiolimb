<head>
    <meta charset="utf-8" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7c5cfc",
                        "background-light": "#f8f6f6",
                        "background-dark": "#050508",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                    },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .canvas-container {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
        }

        .grid-visualizer {
            background: rgba(5, 5, 8, 0.5);
            border-radius: 8px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            width: 100%;
            height: 100%;
            min-height: 400px;
            display: grid;
            position: relative;
            padding: 16px;
            transition: all 0.3s ease;
        }

        .grid-item {
            background: rgba(124, 92, 252, 0.1);
            border: 1px solid rgba(124, 92, 252, 0.4);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7c5cfc;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
            box-shadow: inset 0 0 10px rgba(124, 92, 252, 0.05);
        }

        input[type="number"],
        input[type="text"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8f6f6;
            outline: none;
        }

        input:focus {
            border-color: #7c5cfc;
        }
    </style>
    <link rel="canonical" href="https://www.studiolimb.com/grid-generator.html">
    <meta name="description" content="Générateur interactif CSS Grid. Créez des mises en page complexes en quelques secondes.">
    <link rel="alternate" hreflang="x-default" href="https://www.studiolimb.com/grid-generator.html" />
    <link rel="alternate" hreflang="en" href="https://www.studiolimb.com/grid-generator.html" />
    <link rel="alternate" hreflang="es" href="https://www.studiolimb.com/es/grid-generator.html" />
    <link rel="alternate" hreflang="fr" href="https://www.studiolimb.com/fr/grid-generator.html" />
    <link rel="alternate" hreflang="hi" href="https://www.studiolimb.com/hi/grid-generator.html" />
    <link rel="alternate" hreflang="pt-BR" href="https://www.studiolimb.com/pt/grid-generator.html" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://studiolimb.com/fr/grid-generator.html" />
    <meta property="og:title" content="CSS Grid Generator — Visual Layout Builder" />
    <meta property="og:description" content="Build complex CSS Grid layouts visually with drag controls. Generate grid-template-columns and rows code instantly." />
    <meta property="og:site_name" content="StudioLimb" />
    <meta property="og:locale" content="fr_FR" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CSS Grid Generator — Visual Layout Builder" />
    <meta name="twitter:description" content="Build complex CSS Grid layouts visually with drag controls. Generate grid-template-columns and rows code instantly." />
    <meta name="twitter:site" content="@studiolimb" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "CSS Grid Generator",
      "description": "Build complex CSS Grid layouts visually with drag controls. Generate grid-template-columns and rows code instantly.",
      "url": "https://studiolimb.com/fr/grid-generator.html",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "All",
      "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"},
      "featureList": "css grid generator, css grid layout, grid builder, css columns"
    }
    </script>
</head>

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col">
        <!-- Main Background Canvas -->
        <div class="absolute inset-0 z-0 canvas-container"></div>

        <!-- Top Navigation Bar -->
        <header class="relative z-20 flex items-center justify-between px-6 py-4 glass-panel m-4 rounded-xl shadow-2xl">
            <div class="flex items-center gap-3">
                <div
                    class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined">grid_view</span>
                </div>
                <div>
                    <h2 class="text-lg font-bold leading-tight tracking-tight">StudioLimb</h2>
                    <p class="text-[10px] uppercase tracking-widest font-semibold opacity-60">Creative Suite</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button id="btnCopy"
                    class="flex h-10 px-6 items-center justify-center rounded-xl bg-primary text-white text-sm font-bold shadow-lg shadow-primary/25 hover:opacity-90 transition-all gap-2"
                    onclick="copyCode()">
                    <span class="material-symbols-outlined text-[18px]">content_copy</span> Copier CSS
                </button>
            </div>
        </header>

        <main class="relative z-10 flex flex-1 overflow-hidden px-4 pb-4 gap-6">

            <!-- Sidebar Controls -->
            <div class="flex w-96 flex-col gap-4 h-full">
                <div class="flex flex-col gap-4 glass-panel p-5 rounded-xl">
                    <div>
                        <h1 class="text-xl font-bold">Grid Gen</h1>
                        <p class="text-sm font-medium text-slate-400">Layout Builder <span
                                class="text-primary">Premier</span></p>
                    </div>
                </div>

                <div class="flex flex-1 flex-col glass-panel p-5 rounded-xl overflow-y-auto scrollbar-hide space-y-6">

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Colonnes (Cols)</label>
                            <input type="number" id="cols" value="3" min="1" max="10"
                                class="w-full rounded-lg px-3 py-2 text-sm transition-colors focus:ring-1 focus:ring-primary h-10"
                                oninput="updateGrid()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Lignes (Rows)</label>
                            <input type="number" id="rows" value="3" min="1" max="10"
                                class="w-full rounded-lg px-3 py-2 text-sm transition-colors focus:ring-1 focus:ring-primary h-10"
                                oninput="updateGrid()">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Col Gap
                                (px)</label>
                            <input type="number" id="colGap" value="20" min="0" max="100"
                                class="w-full rounded-lg px-3 py-2 text-sm transition-colors focus:ring-1 focus:ring-primary h-10"
                                oninput="updateGrid()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Row Gap
                                (px)</label>
                            <input type="number" id="rowGap" value="20" min="0" max="100"
                                class="w-full rounded-lg px-3 py-2 text-sm transition-colors focus:ring-1 focus:ring-primary h-10"
                                oninput="updateGrid()">
                        </div>
                    </div>

                    <div class="space-y-2 pt-4 border-t border-white/5">
                        <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Column Widths
                            Template</label>
                        <input type="text" id="colWidthsInput" value="1fr 1fr 1fr"
                            class="w-full rounded-lg px-3 py-2 text-sm transition-colors font-mono text-primary h-10"
                            oninput="updateGridManual()">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Row Heights
                            Template</label>
                        <input type="text" id="rowHeightsInput" value="1fr 1fr 1fr"
                            class="w-full rounded-lg px-3 py-2 text-sm transition-colors font-mono text-primary h-10"
                            oninput="updateGridManual()">
                    </div>

                    <div class="pt-4 mt-auto">
                        <button
                            class="w-full py-3 rounded-lg border border-white/10 text-slate-300 text-sm font-bold hover:border-primary hover:text-primary transition-colors"
                            onclick="resetGrid()">Reset to Default</button>
                    </div>

                </div>
            </div>

            <!-- Central Content Stage -->
            <div class="flex-1 glass-panel rounded-xl flex flex-col relative overflow-hidden p-6">
                <!-- Visualizer -->
                <div
                    class="flex-1 w-full bg-[#050508]/50 rounded-xl overflow-hidden shadow-inner border border-white/5">
                    <div class="grid-visualizer" id="gridContainer"></div>
                </div>

                <!-- Floating code view at bottom -->
                <div
                    class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-[#0b0b12]/90 backdrop-blur-md border border-white/10 rounded-xl p-4 font-mono text-sm max-h-32 overflow-y-auto text-slate-300 shadow-2xl z-20 min-w-[300px]">
                    <pre id="codeOutput" class="m-0 leading-relaxed"><span class="text-primary">.container</span> {
  <span class="text-emerald-400">display</span>: grid;
}</pre>
                </div>
            </div>

        </main>
    </div>

    <script>
        const container = document.getElementById('gridContainer');
        const codeOutput = document.getElementById('codeOutput');
        const colInput = document.getElementById('cols');
        const rowInput = document.getElementById('rows');
        const colWidths = document.getElementById('colWidthsInput');
        const rowHeights = document.getElementById('rowHeightsInput');

        function updateGrid() {
            const cols = Math.max(1, parseInt(colInput.value) || 1);
            const rows = Math.max(1, parseInt(rowInput.value) || 1);
            const cg = document.getElementById('colGap').value;
            const rg = document.getElementById('rowGap').value;

            colWidths.value = Array(cols).fill('1fr').join(' ');
            rowHeights.value = Array(rows).fill('1fr').join(' ');

            applyStyles(cols, rows, colWidths.value, rowHeights.value, cg, rg);
        }

        function updateGridManual() {
            const cg = document.getElementById('colGap').value;
            const rg = document.getElementById('rowGap').value;

            const cols = colWidths.value.trim().split(/\s+/).length || 1;
            const rows = rowHeights.value.trim().split(/\s+/).length || 1;

            colInput.value = cols;
            rowInput.value = rows;

            applyStyles(cols, rows, colWidths.value, rowHeights.value, cg, rg);
        }

        function applyStyles(cols, rows, cw, rh, cg, rg) {
            container.style.gridTemplateColumns = cw;
            container.style.gridTemplateRows = rh;
            container.style.columnGap = `${cg}px`;
            container.style.rowGap = `${rg}px`;

            container.innerHTML = '';
            for (let i = 0; i < cols * rows; i++) {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerText = i + 1;
                container.appendChild(item);
            }

            updateCode(cw, rh, cg, rg);
        }

        function updateCode(cw, rh, cg, rg) {
            const code = `<span class="text-primary">.container</span> {
  <span class="text-emerald-400">display</span>: grid;
  <span class="text-emerald-400">grid-template-columns</span>: ${cw};
  <span class="text-emerald-400">grid-template-rows</span>: ${rh};
  <span class="text-emerald-400">gap</span>: ${rg}px ${cg}px;
}`;
            codeOutput.innerHTML = code;
        }

        function resetGrid() {
            colInput.value = 3;
            rowInput.value = 3;
            updateGrid();
        }

        function copyCode() {
            const temp = document.createElement('div');
            temp.innerHTML = codeOutput.innerHTML;
            const cleanText = temp.textContent || temp.innerText || "";
            navigator.clipboard.writeText(cleanText).then(() => {
                const btn = document.getElementById('btnCopy');
                const origHtml = btn.innerHTML;
                btn.innerHTML = `<span class="material-symbols-outlined text-[18px]">check</span> Copied!`;
                btn.classList.add('bg-emerald-500', 'shadow-emerald-500/25');
                btn.classList.remove('bg-primary', 'shadow-primary/25');
                setTimeout(() => {
                    btn.innerHTML = origHtml;
                    btn.classList.remove('bg-emerald-500', 'shadow-emerald-500/25');
                    btn.classList.add('bg-primary', 'shadow-primary/25');
                }, 2000);
            });
        }

        updateGrid();
    </script>
    <script src="../shared.js"></script>
</body>

</html>
