<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>StudioLimb | Snowfall Premier</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7c5cfc",
                        "background-light": "#f8f6f6",
                        "background-dark": "#050508",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                    },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .canvas-container {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #7c5cfc;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(124, 92, 252, 0.5);
        }
    </style>
</head>

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col">
        <!-- Main Immersive Canvas Area -->
        <div class="absolute inset-0 z-0 canvas-container">
            <canvas id="snowCanvas" class="w-full h-full"></canvas>
        </div>

        <!-- Top Navigation Bar -->
        <header class="relative z-20 flex items-center justify-between px-6 py-4 glass-panel m-4 rounded-xl shadow-2xl">
            <div class="flex items-center gap-3">
                <div
                    class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined">ac_unit</span>
                </div>
                <div>
                    <h2 class="text-lg font-bold leading-tight tracking-tight">StudioLimb</h2>
                    <p class="text-[10px] uppercase tracking-widest font-semibold opacity-60">Creative Suite</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button
                    class="flex h-10 px-6 items-center justify-center rounded-xl bg-primary text-white text-sm font-bold shadow-lg shadow-primary/25 hover:opacity-90 transition-all"
                    onclick="copyConfig()">
                    Copy JSON
                </button>
                <div class="h-10 w-10 rounded-full border-2 border-primary/20 bg-slate-800 overflow-hidden">
                    <img class="w-full h-full object-cover"
                        src="https://ui-avatars.com/api/?name=Limb&background=7c5cfc&color=fff" />
                </div>
            </div>
        </header>

        <main class="relative z-10 flex flex-1 overflow-hidden px-4 pb-4">
            <!-- Sidebar Controls -->
            <div class="flex w-80 flex-col gap-4">
                <div class="flex flex-col gap-4 glass-panel p-5 rounded-xl">
                    <div>
                        <h1 class="text-xl font-bold">Snowfall Gen</h1>
                        <p class="text-sm font-medium text-slate-400">Organic Particles <span
                                class="text-primary">Premier</span></p>
                    </div>
                </div>

                <div class="flex flex-1 flex-col glass-panel p-5 rounded-xl overflow-y-auto">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xs uppercase tracking-widest font-bold text-slate-400">Particle Engine</h3>
                        <span class="material-symbols-outlined text-slate-400 text-sm">tune</span>
                    </div>

                    <div class="space-y-8">
                        <!-- Density -->
                        <div class="space-y-4">
                            <div class="flex items-center justify-between">
                                <label class="text-sm font-semibold">Count</label>
                                <span id="countVal" class="text-xs font-mono bg-slate-800 px-2 py-1 rounded">150</span>
                            </div>
                            <input type="range" id="density" min="50" max="1000" value="150" oninput="updateParams()">
                        </div>

                        <!-- Speed -->
                        <div class="space-y-4">
                            <div class="flex items-center justify-between">
                                <label class="text-sm font-semibold">Fall Speed</label>
                                <span id="speedVal" class="text-xs font-mono bg-slate-800 px-2 py-1 rounded">2.5</span>
                            </div>
                            <input type="range" id="speed" min="5" max="100" value="25" oninput="updateParams()">
                        </div>

                        <!-- Size -->
                        <div class="space-y-4">
                            <div class="flex items-center justify-between">
                                <label class="text-sm font-semibold">Flake Size</label>
                                <span id="sizeVal" class="text-xs font-mono bg-slate-800 px-2 py-1 rounded">3px</span>
                            </div>
                            <input type="range" id="size" min="1" max="10" value="3" oninput="updateParams()">
                        </div>

                        <!-- Wind -->
                        <div class="space-y-4">
                            <div class="flex items-center justify-between">
                                <label class="text-sm font-semibold">Wind Drift</label>
                                <span id="windVal" class="text-xs font-mono bg-slate-800 px-2 py-1 rounded">0.5</span>
                            </div>
                            <input type="range" id="wind" min="-50" max="50" value="5" oninput="updateParams()">
                        </div>

                        <div class="pt-6 border-t border-white/5">
                            <label class="text-xs uppercase tracking-widest font-bold text-slate-500 block mb-4">Export
                                Format</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button
                                    class="py-2 text-xs font-bold rounded-lg bg-white/5 border border-white/10 hover:border-primary transition-all">JS
                                    Hook</button>
                                <button
                                    class="py-2 text-xs font-bold rounded-lg bg-white/5 border border-white/10 hover:border-primary transition-all">CSS
                                    Keyframes</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Central Canvas Empty Area -->
            <div class="flex-1"></div>

            <!-- Floating UI Tools -->
            <div class="absolute right-8 top-1/2 -translate-y-1/2 flex flex-col gap-4">
                <div class="flex flex-col glass-panel rounded-xl shadow-2xl overflow-hidden p-2 gap-2">
                    <button class="p-3 rounded-lg hover:bg-primary/20 transition-all text-slate-400 hover:text-primary">
                        <span class="material-symbols-outlined">zoom_in</span>
                    </button>
                    <button class="p-3 rounded-lg hover:bg-primary/20 transition-all text-slate-400 hover:text-primary">
                        <span class="material-symbols-outlined">zoom_out</span>
                    </button>
                    <hr class="border-white/5">
                    <button class="p-3 rounded-lg hover:bg-primary/20 transition-all text-slate-400 hover:text-primary">
                        <span class="material-symbols-outlined">center_focus_weak</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let width, height;

        const params = {
            count: 150,
            speed: 2.5,
            size: 3,
            wind: 0.5
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height - height;
                this.size = Math.random() * params.size + 1;
                this.speed = (Math.random() * params.speed + 1) * 0.5;
                this.velX = params.wind * (Math.random() * 0.5 + 0.5);
                this.opacity = Math.random() * 0.5 + 0.3;
            }

            update() {
                this.y += this.speed;
                this.x += this.velX;

                if (this.y > height) {
                    this.reset();
                    this.y = -10;
                }
                if (this.x > width) this.x = 0;
                if (this.x < 0) this.x = width;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < params.count; i++) {
                particles.push(new Particle());
            }
        }

        function updateParams() {
            params.count = parseInt(document.getElementById('density').value);
            params.speed = parseInt(document.getElementById('speed').value) / 10;
            params.size = parseInt(document.getElementById('size').value);
            params.wind = parseInt(document.getElementById('wind').value) / 10;

            document.getElementById('countVal').innerText = params.count;
            document.getElementById('speedVal').innerText = params.speed.toFixed(1);
            document.getElementById('sizeVal').innerText = params.size + 'px';
            document.getElementById('windVal').innerText = params.wind.toFixed(1);

            if (particles.length !== params.count) {
                initParticles();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();

        function copyConfig() {
            const config = JSON.stringify(params, null, 2);
            navigator.clipboard.writeText(config).then(() => {
                alert('Configuration JSON copied!');
            });
        }
    </script>
</body>

</html>
