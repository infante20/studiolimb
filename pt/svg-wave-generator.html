    <style>
        .glass-panel {

        /* Custom Input ranges */

            outline: none;

        input[type="range"]::-webkit-slider-thumb {

            transition: transform 0.1s;

        /* Color Well */

        .color-well-wrapper input[type="color"] {

        }

        /* Generated SVG Styles inside preview */
        #svgPreview svg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: drop-shadow(0 -10px 30px rgba(124, 92, 252, 0.2));
            transition: opacity 0.3s;
        }

        /* Syntax Highlighter override */
        pre {
            background: transparent !important;
            margin: 0;

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col">
        <!-- Main Background Canvas -->
        <div class="absolute inset-0 z-0 bg-[#050508]"></div>

        <!-- Top Navigation Bar -->
        <header class="relative z-20 flex items-center justify-between px-6 py-4 glass-panel m-4 rounded-xl shadow-2xl">
            <div class="flex items-center gap-3">
                <div
                    class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined">waves</span>
                </div>
                <div>
                    <h2 class="text-lg font-bold leading-tight tracking-tight">StudioLimb</h2>
                    <p class="text-[10px] uppercase tracking-widest font-semibold opacity-60">Generator Suite</p>
                </div>
            </div>

            <button
                class="flex h-10 px-6 items-center justify-center rounded-xl bg-white text-black text-sm font-bold shadow-xl shadow-white/10 hover:scale-105 active:scale-95 transition-all"
                onclick="downloadSVG()">
                <span class="material-symbols-outlined text-[18px] mr-2">download</span> Save SVG
            </button>
        </header>

        <main class="relative z-10 flex flex-1 overflow-hidden px-4 pb-4 gap-6">

            <!-- Sidebar Controls -->
            <div class="flex w-[350px] flex-col gap-4 h-full">
                <div class="flex flex-col gap-4 glass-panel p-6 rounded-xl overflow-y-auto scrollbar-hide h-full">

                    <div class="mb-2">
                        <h1 class="text-xl font-bold mb-1">Wave Generator</h1>
                        <p class="text-xs text-slate-400 font-medium leading-relaxed">Design fluid, organic SVG section
                            dividers dynamically.</p>
                    </div>

                    <div class="h-px bg-white/10 my-1"></div>

                    <!-- Generate Control -->
                    <button
                        class="w-full h-12 rounded-xl bg-primary text-white text-sm font-bold shadow-xl shadow-primary/20 hover:bg-[#8668fc] active:scale-[0.98] transition-all flex items-center justify-center gap-2 border border-primary/50"
                        onclick="generate()">
                        <span class="material-symbols-outlined text-[20px]">casino</span> Shuffle Waveform
                    </button>

                    <div class="space-y-6 mt-4">
                        <!-- Complexity Slider -->
                        <div class="relative">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[10px] uppercase font-bold tracking-widest text-slate-500">Points
                                    (Complexity)</label>
                                <span class="text-white font-mono text-sm font-bold bg-white/5 px-2 py-0.5 rounded"
                                    id="val-complexity">4</span>
                            </div>
                            <input type="range" id="complexity" value="4" min="2" max="12" step="1"
                                oninput="generate()">
                        </div>

                        <!-- Fluidity Slider -->
                        <div class="relative">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[10px] uppercase font-bold tracking-widest text-slate-500">Variance
                                    (Fluidity)</label>
                                <span class="text-white font-mono text-sm font-bold bg-white/5 px-2 py-0.5 rounded"
                                    id="val-fluidity">50</span>
                            </div>
                            <input type="range" id="fluidity" value="50" min="10" max="150" step="1"
                                oninput="generate()">
                        </div>

                        <!-- Opacity Slider -->
                        <div class="relative">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[10px] uppercase font-bold tracking-widest text-slate-500">Fill
                                    Opacity</label>
                                <span class="text-white font-mono text-sm font-bold bg-white/5 px-2 py-0.5 rounded"
                                    id="val-opacity">1.0</span>
                            </div>
                            <input type="range" id="opacity" value="100" min="10" max="100" step="5"
                                oninput="generate()">
                        </div>

                        <!-- Color Picker -->
                        <div class="space-y-2">
                            <div class="flex justify-between items-center">
                                <label class="text-[10px] uppercase font-bold tracking-widest text-slate-500">Shape
                                    Color</label>
                                <span id="colorHex"
                                    class="font-code text-xs font-bold text-white bg-white/5 px-2 py-0.5 rounded uppercase">#7C5CFC</span>
                            </div>
                            <div class="color-well-wrapper">
                                <input type="color" id="shapeColor" value="#7c5cfc" oninput="generate()">
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- Central Content Stage -->
            <div class="flex-1 flex flex-col gap-4 relative overflow-hidden">

                <!-- Visual Stage -->
                <div
                    class="flex-1 rounded-xl stage-bg flex flex-col justify-end overflow-hidden relative shadow-2xl border border-white/5 w-full">

                    <div class="absolute inset-0 bg-gradient-to-t from-white/5 to-transparent pointer-events-none z-10">
                    </div>

                    <!-- SVG Injected Here -->
                    <div id="svgPreview" class="w-full relative z-20" style="height: 50%;">
                    </div>
                </div>

                <!-- Code Extractor -->
                <div class="h-40 glass-panel rounded-xl flex flex-col relative overflow-hidden">
                    <div
                        class="absolute top-0 inset-x-0 h-10 bg-gradient-to-b from-[#0a0a0f] to-transparent z-10 pointer-events-none">
                    </div>

                    <div class="absolute top-4 right-6 z-20 flex gap-2">
                        <span
                            class="bg-primary/20 text-primary border border-primary/30 px-3 py-1 font-mono text-[10px] font-bold rounded-lg shadow-md cursor-default pointer-events-none flex items-center">1440
                            x 320 px</span>
                        <button
                            class="flex h-8 px-4 items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 text-white text-xs font-bold shadow-lg transition-all"
                            onclick="copyCode()">
                            <span class="material-symbols-outlined text-[16px] mr-1.5">content_copy</span> Copy Raw
                        </button>
                    </div>

                    <textarea id="codeOutput" readonly
                        class="w-full h-full p-6 pt-12 font-code text-[12px] leading-relaxed overflow-auto border-none bg-transparent text-[#dcdcaa] focus:ring-0 resize-none outline-none select-all"></textarea>
                </div>

            </div>

        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast"
        class="fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 bg-white text-black font-bold px-6 py-3 rounded-full flex items-center gap-2 shadow-2xl z-50 pointer-events-none">
        <span class="material-symbols-outlined text-green-500 text-[20px]">check_circle</span>
        <span>SVG code copied to clipboard!</span>
    </div>

    <script>
        const preview = document.getElementById('svgPreview');
        const codeOut = document.getElementById('codeOutput');

        function generate() {
            const complexity = parseInt(document.getElementById('complexity').value);
            const fluidity = parseInt(document.getElementById('fluidity').value);
            const color = document.getElementById('shapeColor').value;
            const opacity = document.getElementById('opacity').value / 100;

            document.getElementById('val-complexity').innerText = complexity;
            document.getElementById('val-fluidity').innerText = fluidity;
            document.getElementById('val-opacity').innerText = opacity.toFixed(1);
            document.getElementById('colorHex').innerText = color.toUpperCase();

            // Generate Path Data
            const width = 1440;
            const height = 320;
            const step = width / (complexity - 1);

            let path = `M 0 ${height / 2} `;

            for (let i = 1; i < complexity; i++) {
                const x = i * step;
                const y = (height / 2) + (Math.random() - 0.5) * fluidity * 2;

                // Curve factor
                const cp1x = x - (step / 2);
                const cp1y = (height / 2) + (Math.random() - 0.5) * fluidity;

                path += `Q ${cp1x} ${cp1y.toFixed(1)}, ${x} ${y.toFixed(1)} `;
            }

            path += `L ${width} ${height} L 0 ${height} Z`;

            const svgContent = `<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg">
  <path fill="${color}" fill-opacity="${opacity}" d="${path}"></path>
</svg>`;

            preview.innerHTML = svgContent;
            codeOut.value = svgContent;
        }

        function copyCode() {
            const code = codeOut.value;
            navigator.clipboard.writeText(code).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('translate-y-20', 'opacity-0');
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 2500);
            });
        }

        function downloadSVG() {
            const blob = new Blob([codeOut.value], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = "studiolimb-wave.svg";
            link.click();
        }

        // Init
        generate();
    </script>
    <script src="../shared.js"></script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js")}</script>
</body>
