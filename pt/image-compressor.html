<!DOCTYPE html>
<html class="dark" lang="pt">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>StudioLimb | Compressor Premier</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7c5cfc",
                        "background-light": "#f8f6f6",
                        "background-dark": "#050508",
                        "success": "#34d399",
                        "error": "#f87171",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                    },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .canvas-container {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
        }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drop-zone:hover,
        .drop-zone.active {
            border-color: #7c5cfc;
            background: rgba(124, 92, 252, 0.05);
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #7c5cfc;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(124, 92, 252, 0.5);
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
    </style>
    <link rel="canonical" href="https://studiolimb.com/image-compressor.html">
    <meta name="description" content="Reduza o tamanho das suas imagens sem perder qualidade visível diretamente no navegador.">
</head>

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col">
        <!-- Main Background Canvas -->
        <div class="absolute inset-0 z-0 canvas-container"></div>

        <!-- Top Navigation Bar -->
        <header class="relative z-20 flex items-center justify-between px-6 py-4 glass-panel m-4 rounded-xl shadow-2xl">
            <div class="flex items-center gap-3">
                <div
                    class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined">compress</span>
                </div>
                <div>
                    <h2 class="text-lg font-bold leading-tight tracking-tight">StudioLimb</h2>
                    <p class="text-[10px] uppercase tracking-widest font-semibold opacity-60">Media Suite</p>
                </div>
            </div>
            <div
                class="text-[10px] uppercase tracking-widest font-bold text-slate-400 bg-white/5 py-1 px-3 rounded-full border border-white/10 hidden md:block">
                100% Client-Side Processing
            </div>
        </header>

        <main class="relative z-10 flex flex-1 overflow-hidden px-4 pb-4 gap-6">

            <!-- Sidebar Controls -->
            <div class="flex w-[380px] flex-col gap-4 h-full hidden" id="sidebar">
                <div class="flex flex-col gap-4 glass-panel p-6 rounded-xl overflow-y-auto scrollbar-hide h-full">
                    <div>
                        <h1 class="text-xl font-bold mb-1">Image Compressor</h1>
                        <p class="text-xs text-slate-400 font-medium">Reduce file size instantly without compromising
                            quality.</p>
                    </div>

                    <div class="h-px bg-white/10 my-1"></div>

                    <!-- Compression Settings -->
                    <div class="space-y-6">
                        <div class="space-y-4 bg-[#0a0a0f]/80 p-5 rounded-xl border border-white/5">
                            <div class="flex justify-between items-center">
                                <label
                                    class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Qualidade de Compressão</label>
                                <span id="qualityVal" class="font-mono text-sm font-bold text-primary">80%</span>
                            </div>
                            <input type="range" id="qualityRange" min="1" max="100" value="80" class="w-full">
                        </div>

                        <div class="space-y-3 bg-[#0a0a0f]/80 p-5 rounded-xl border border-white/5">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500 block">Export
                                Format</label>
                            <div class="relative">
                                <select id="formatSelect"
                                    class="w-full bg-[#050508] border border-white/10 rounded-lg px-4 py-3 text-sm text-slate-200 outline-none focus:border-primary appearance-none cursor-pointer">
                                    <option value="image/jpeg">JPEG (Solid Compression)</option>
                                    <option value="image/webp">WebP (High Efficiency)</option>
                                    <option value="image/png">PNG (Lossless / High Quality)</option>
                                </select>
                                <span
                                    class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="mt-auto space-y-3 pt-6">
                        <button
                            class="w-full h-14 rounded-xl bg-primary text-white text-base font-bold shadow-xl shadow-primary/20 hover:opacity-90 transition-all border border-primary/50 flex items-center justify-center gap-2"
                            id="downloadBtn">
                            <span class="material-symbols-outlined text-[20px]">download</span> Download Image
                        </button>
                        <button
                            class="w-full h-12 rounded-xl bg-white/5 text-slate-300 hover:text-white text-sm font-bold transition-all border border-white/10 flex items-center justify-center gap-2"
                            onclick="location.reload()">
                            <span class="material-symbols-outlined text-[18px]">restart_alt</span> Compress Another
                        </button>
                    </div>
                </div>
            </div>

            <!-- Central Content Stage -->
            <div class="flex-1 glass-panel rounded-xl flex flex-col relative overflow-hidden bg-[#0a0a0f]/90">

                <!-- Initial State: Drop Zone -->
                <div class="flex-1 flex items-center justify-center p-8" id="dropZoneContainer">
                    <div class="w-full max-w-2xl aspect-[3/2] drop-zone rounded-3xl flex flex-col items-center justify-center bg-[#050508]/50 gap-4"
                        id="dropZone">
                        <div
                            class="w-20 h-20 rounded-full bg-primary/10 text-primary flex items-center justify-center border border-primary/20 mb-2 shadow-xl shadow-primary/5">
                            <span class="material-symbols-outlined text-[40px]">upload_file</span>
                        </div>
                        <h2 class="text-3xl font-bold tracking-tight">Solte sua imagem aqui</h2>
                        <p class="text-slate-400 font-medium">Supports PNG, JPEG, WebP (up to 20MB)</p>
                        <button
                            class="mt-4 px-8 py-3 rounded-full bg-white text-black font-bold text-sm hover:scale-105 transition-transform">Browse
                            Files</button>
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                    </div>
                </div>

                <!-- Active State: Workspace -->
                <div class="flex-1 flex-col hidden h-full p-6 md:p-10" id="workspaceContainer">

                    <!-- Stats Bar -->
                    <div class="flex flex-wrap gap-4 mb-8">
                        <div
                            class="flex-1 min-w-[200px] bg-white/5 border border-white/10 rounded-2xl p-5 flex items-center justify-between">
                            <div>
                                <p class="text-[10px] uppercase tracking-widest font-bold text-slate-500 mb-1">Original
                                    Size</p>
                                <p class="text-2xl font-mono font-bold" id="originalSize">0 KB</p>
                            </div>
                            <span class="material-symbols-outlined text-slate-600 text-[32px]">image</span>
                        </div>

                        <div
                            class="flex-1 min-w-[200px] bg-white/5 border border-white/10 rounded-2xl p-5 flex items-center justify-between relative overflow-hidden group">
                            <div class="absolute inset-0 bg-primary/5 group-hover:bg-primary/10 transition-colors">
                            </div>
                            <div class="relative z-10">
                                <p class="text-[10px] uppercase tracking-widest font-bold text-slate-500 mb-1">
                                    Compressed Size</p>
                                <div class="flex items-end gap-3">
                                    <p class="text-3xl font-mono font-black text-white drop-shadow-lg"
                                        id="compressedSize">0 KB</p>
                                    <span
                                        class="text-sm font-bold px-2 py-0.5 rounded-full bg-success/20 text-success border border-success/30 mb-1"
                                        id="reductionPercent">Save 0%</span>
                                </div>
                            </div>
                            <span
                                class="material-symbols-outlined text-primary/30 text-[40px] relative z-10">compress</span>
                        </div>
                    </div>

                    <!-- Image Preview Area -->
                    <div
                        class="flex-1 bg-[#050508]/80 rounded-2xl border border-white/10 p-4 flex items-center justify-center relative shadow-inner overflow-hidden">
                        <!-- Checkerboard Pattern for transparent bg -->
                        <div class="absolute inset-0 opacity-[0.05]"
                            style="background-image: linear-gradient(45deg, #fff 25%, transparent 25%), linear-gradient(-45deg, #fff 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #fff 75%), linear-gradient(-45deg, transparent 75%, #fff 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;">
                        </div>

                        <img id="previewImg"
                            class="max-w-full max-h-[500px] object-contain relative z-10 rounded-lg shadow-2xl transition-all duration-300"
                            alt="Compressed Preview">
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const dropZoneContainer = document.getElementById('dropZoneContainer');
        const workspaceContainer = document.getElementById('workspaceContainer');
        const sidebar = document.getElementById('sidebar');
        const previewImg = document.getElementById('previewImg');
        const originalSizeText = document.getElementById('originalSize');
        const compressedSizeText = document.getElementById('compressedSize');
        const reductionText = document.getElementById('reductionPercent');
        const qualityRange = document.getElementById('qualityRange');
        const qualityValText = document.getElementById('qualityVal');
        const formatSelect = document.getElementById('formatSelect');
        const downloadBtn = document.getElementById('downloadBtn');

        let originalFile = null;
        let originalImg = null;
        let compressedBlob = null;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('active'); };
        dropZone.ondragleave = () => dropZone.classList.remove('active');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            originalFile = file;

            const reader = new FileReader();
            reader.onload = (e) => {
                originalImg = new Image();
                originalImg.onload = () => {
                    dropZoneContainer.style.display = 'none';
                    workspaceContainer.style.display = 'flex';
                    sidebar.style.display = 'flex';
                    originalSizeText.innerText = formatSize(file.size);
                    compressImage();
                };
                originalImg.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        qualityRange.oninput = (e) => {
            qualityValText.innerText = e.target.value + '%';
            compressImage();
        };

        formatSelect.onchange = () => compressImage();

        function compressImage() {
            if (!originalImg) return;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = originalImg.width;
            canvas.height = originalImg.height;
            ctx.drawImage(originalImg, 0, 0);

            const format = formatSelect.value;
            const quality = qualityRange.value / 100;

            canvas.toBlob((blob) => {
                compressedBlob = blob;
                const url = URL.createObjectURL(blob);
                previewImg.src = url;
                compressedSizeText.innerText = formatSize(blob.size);

                const reduction = ((originalFile.size - blob.size) / originalFile.size * 100).toFixed(1);
                reductionText.innerText = reduction >= 0 ? `Save ${reduction}%` : `Up ${Math.abs(reduction)}%`;

                if (reduction >= 0) {
                    reductionText.className = 'text-sm font-bold px-3 py-1 rounded-full bg-success/20 text-success border border-success/30 mb-1 inline-flex items-center gap-1';
                    reductionText.innerHTML = `<span class="material-symbols-outlined text-[14px]">arrow_downward</span> ${reduction}%`;
                } else {
                    reductionText.className = 'text-sm font-bold px-3 py-1 rounded-full bg-error/20 text-error border border-error/30 mb-1 inline-flex items-center gap-1';
                    reductionText.innerHTML = `<span class="material-symbols-outlined text-[14px]">arrow_upward</span> ${Math.abs(reduction)}%`;
                }
            }, format, quality);
        }

        downloadBtn.onclick = () => {
            if (!compressedBlob) return;
            const link = document.createElement('a');
            const extension = formatSelect.value.split('/')[1];
            link.href = URL.createObjectURL(compressedBlob);
            link.download = `compressed-${originalFile.name.split('.')[0]}.${extension}`;
            link.click();

            // Visual feedback
            const origHtml = downloadBtn.innerHTML;
            downloadBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]">check_circle</span> Downloaded!';
            downloadBtn.classList.add('bg-success', 'border-success', 'shadow-success/30');
            setTimeout(() => {
                downloadBtn.innerHTML = origHtml;
                downloadBtn.classList.remove('bg-success', 'border-success', 'shadow-success/30');
            }, 2000);
        };

        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>

</html>
