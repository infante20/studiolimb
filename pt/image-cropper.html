            background: rgba(255, 255, 255, 0.03);

        /* CropperJS Custom Theme */

            border-radius: var(--crop-radius, 0%);

        .cropper-point {

        }

        .cropper-view-box {

            width: 10px;

            background-image: none;
            background-color: transparent;
        }

        .cropper-modal {

        }

<body class="bg-background-dark font-display text-slate-100 antialiased h-screen overflow-hidden flex flex-col">
    <!-- Top Navigation -->
    <header
        class="relative z-20 flex items-center justify-between px-6 py-4 glass-panel m-4 rounded-xl shadow-2xl shrink-0">
        <div class="flex items-center gap-3">
            <a href="index.html"
                class="flex h-10 w-10 items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 text-slate-300 transition-colors">
                <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            </a>
            <div
                class="flex h-10 w-10 items-center justify-center rounded-lg bg-pink-500/20 text-pink-400 border border-pink-500/30">
                <span class="material-symbols-outlined">crop</span>
            </div>
            <div>
                <h2 class="text-lg font-bold leading-tight tracking-tight">Image Cropper</h2>
                <p class="text-[10px] uppercase tracking-widest font-semibold text-slate-400">StudioLimb Tools</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button id="btnDownload" onclick="downloadCropped()" disabled
                class="flex h-10 px-6 items-center justify-center rounded-xl bg-primary text-white text-sm font-bold shadow-lg shadow-primary/25 hover:opacity-90 transition-all gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <span class="material-symbols-outlined text-[18px]">download</span> Export Image
            </button>
        </div>
    </header>

    <main class="relative z-10 flex flex-1 overflow-hidden px-4 pb-4 gap-6">

        <!-- Sidebar Controls -->
        <div class="flex w-80 flex-col gap-4 h-full shrink-0">
            <div class="flex flex-col flex-1 glass-panel p-5 rounded-xl overflow-y-auto scrollbar-hide">
                <div class="space-y-6">

                    <!-- Upload Section -->
                    <div id="uploadSection" class="relative group cursor-pointer"
                        onclick="document.getElementById('fileInput').click()">
                        <div
                            class="absolute inset-0 bg-primary/20 rounded-xl blur-xl group-hover:bg-primary/30 transition-all">
                        </div>
                        <div
                            class="relative flex flex-col items-center justify-center p-8 border-2 border-dashed border-primary/50 rounded-xl bg-[#050508] text-center hover:border-primary transition-colors">
                            <span
                                class="material-symbols-outlined text-4xl text-primary mb-2">add_photo_alternate</span>
                            <span class="text-sm font-bold text-slate-200">Upload Image</span>
                            <span class="text-xs text-slate-500 mt-1">JPG, PNG, WebP</span>
                        </div>
                        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp" class="hidden"
                            onchange="handleImageUpload(event)">
                    </div>

                    <!-- Aspect Ratios -->
                    <div class="pt-4 border-t border-white/5 opacity-50 pointer-events-none transition-opacity"
                        id="controlsSection">
                        <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500 block mb-3">Aspect
                            Ratio</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setRatio(NaN)"
                                class="ratio-btn py-2 text-xs font-bold rounded-lg bg-white/5 border border-white/10 hover:border-primary transition-all text-primary border-primary">Livre</button>
                            <button onclick="setRatio(1)"
                                class="ratio-btn py-2 text-xs font-bold rounded-lg bg-white/5 border border-white/10 hover:border-primary transition-all">1:1</button>
                            <button onclick="setRatio(16/9)"
                                class="ratio-btn py-2 text-xs font-bold rounded-lg bg-white/5 border border-white/10 hover:border-primary transition-all">16:9</button>
                            <button onclick="setRatio(4/3)"
                                class="ratio-btn py-2 text-xs font-bold rounded-lg bg-white/5 border border-white/10 hover:border-primary transition-all">4:3</button>
                            <button onclick="setRatio(9/16)"
                                class="ratio-btn py-2 text-xs font-bold rounded-lg bg-white/5 border border-white/10 hover:border-primary transition-all">9:16</button>
                            <button onclick="setRatio(3/4)"
                                class="ratio-btn py-2 text-xs font-bold rounded-lg bg-white/5 border border-white/10 hover:border-primary transition-all">3:4</button>
                        </div>

                        <!-- Shape -->
                        <div class="mt-6">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500 block mb-3">Crop
                                Shape</label>
                            <div class="flex gap-2 bg-black/40 p-1 rounded-lg border border-white/5">
                                <button onclick="setShape('square')" id="btnSquare"
                                    class="flex-1 py-1.5 text-xs font-bold rounded-md bg-white/10 text-white transition-all">Rectangle</button>
                                <button onclick="setShape('circle')" id="btnCircle"
                                    class="flex-1 py-1.5 text-xs font-bold rounded-md text-slate-400 hover:text-white transition-all">Circle</button>
                            </div>
                            <p class="text-[10px] text-slate-500 mt-2">Circle crop forces 1:1 ratio and exports as
                                transparent PNG.</p>
                        </div>

                        <!-- Actions -->
                        <div class="mt-6 space-y-2">
                            <label
                                class="text-[10px] uppercase tracking-wider font-bold text-slate-500 block mb-3">Transform</label>
                            <div class="flex gap-2">
                                <button onclick="cropper.rotate(-90)"
                                    class="flex-1 flex items-center justify-center py-2 bg-white/5 hover:bg-white/10 rounded-lg text-slate-300 border border-white/5">
                                    <span class="material-symbols-outlined text-[18px]">rotate_left</span>
                                </button>
                                <button onclick="cropper.rotate(90)"
                                    class="flex-1 flex items-center justify-center py-2 bg-white/5 hover:bg-white/10 rounded-lg text-slate-300 border border-white/5">
                                    <span class="material-symbols-outlined text-[18px]">rotate_right</span>
                                </button>
                                <button onclick="cropper.scaleX(cropper.getData().scaleX === -1 ? 1 : -1)"
                                    class="flex-1 flex items-center justify-center py-2 bg-white/5 hover:bg-white/10 rounded-lg text-slate-300 border border-white/5">
                                    <span class="material-symbols-outlined text-[18px]">flip</span>
                                </button>
                            </div>
                            <button onclick="cropper.reset()"
                                class="w-full py-2 text-xs font-bold rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all mt-2">
                                Reset Changes
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Central Work Area -->
        <div class="flex-1 glass-panel rounded-xl flex flex-col overflow-hidden relative checkered-bg">
            <div id="editorWorkspace"
                class="w-full h-full flex items-center justify-center p-8 text-slate-500 flex-col gap-4">
                <span class="material-symbols-outlined text-6xl opacity-20">crop</span>
                <p class="text-sm">Upload an image to start cropping</p>
            </div>
            <!-- Hidden image element for cropper -->
            <div class="absolute inset-4 hidden" id="cropperContainer">
                <img id="image" src="" class="max-w-full max-h-full block">
            </div>
        </div>
    </main>

    <script>
        let cropper = null;
        let cropShape = 'square';
        let originalFileName = 'image';
        let originalFileType = 'image/jpeg';

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            originalFileName = file.name.split('.')[0];
            originalFileType = file.type;

            const reader = new FileReader();
            reader.onload = (e) => {
                initCropper(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function initCropper(imgSrc) {
            const image = document.getElementById('image');
            const container = document.getElementById('cropperContainer');
            const workspace = document.getElementById('editorWorkspace');
            const controls = document.getElementById('controlsSection');
            const btnDownload = document.getElementById('btnDownload');

            workspace.classList.add('hidden');
            container.classList.remove('hidden');
            controls.classList.remove('opacity-50', 'pointer-events-none');
            btnDownload.disabled = false;

            image.src = imgSrc;

            if (cropper) {
                cropper.destroy();
            }

            cropper = new Cropper(image, {
                viewMode: 2,
                background: false,
                autoCropArea: 0.8,
                responsive: true,
                restore: false
            });

            // Reset UI state
            setShape('square');
            updateActiveRatioBtn(document.querySelector('.ratio-btn'));
        }

        function setRatio(ratio) {
            if (!cropper) return;
            cropper.setAspectRatio(ratio);

            if (cropShape === 'circle' && isNaN(ratio)) {
                setShape('square'); // Force square if free crop is selected while circle is active
            }

            // Update UI buttons
            const btns = document.querySelectorAll('.ratio-btn');
            const clickedBtn = Array.from(btns).find(b => {
                if (isNaN(ratio)) return b.textContent === 'Free';
                if (ratio === 1) return b.textContent === '1:1';
                if (ratio > 1.7 && ratio < 1.8) return b.textContent === '16:9';
                if (ratio > 1.3 && ratio < 1.4) return b.textContent === '4:3';
                if (ratio > 0.5 && ratio < 0.6) return b.textContent === '9:16';
                if (ratio > 0.7 && ratio < 0.8) return b.textContent === '3:4';
            });
            if (clickedBtn) updateActiveRatioBtn(clickedBtn);
        }

        function updateActiveRatioBtn(activeBtn) {
            const btns = document.querySelectorAll('.ratio-btn');
            btns.forEach(b => {
                b.classList.remove('text-primary', 'border-primary');
                b.classList.add('text-slate-200', 'border-white/10');
            });
            activeBtn.classList.add('text-primary', 'border-primary');
            activeBtn.classList.remove('text-slate-200', 'border-white/10');
        }

        function setShape(shape) {
            if (!cropper) return;
            cropShape = shape;
            const root = document.documentElement;

            const btnSquare = document.getElementById('btnSquare');
            const btnCircle = document.getElementById('btnCircle');

            if (shape === 'circle') {
                root.style.setProperty('--crop-radius', '50%');
                setRatio(1); // Force 1:1 for circle

                btnCircle.classList.replace('bg-transparent', 'bg-white/10');
                btnCircle.classList.replace('text-slate-400', 'text-white');
                btnSquare.classList.replace('bg-white/10', 'bg-transparent');
                btnSquare.classList.replace('text-white', 'text-slate-400');
            } else {
                root.style.setProperty('--crop-radius', '0%');

                btnSquare.classList.replace('bg-transparent', 'bg-white/10');
                btnSquare.classList.replace('text-slate-400', 'text-white');
                btnCircle.classList.replace('bg-white/10', 'bg-transparent');
                btnCircle.classList.replace('text-white', 'text-slate-400');
            }
        }

        function getRoundedCanvas(sourceCanvas) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            const width = sourceCanvas.width;
            const height = sourceCanvas.height;

            canvas.width = width;
            canvas.height = height;
            context.imageSmoothingEnabled = true;
            context.drawImage(sourceCanvas, 0, 0, width, height);
            context.globalCompositeOperation = 'destination-in';
            context.beginPath();
            context.arc(width / 2, height / 2, Math.min(width, height) / 2, 0, 2 * Math.PI, true);
            context.fill();
            return canvas;
        }

        function downloadCropped() {
            if (!cropper) return;

            let canvas = cropper.getCroppedCanvas({
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high',
            });

            let finalType = originalFileType;
            let extension = originalFileType.split('/')[1];

            if (cropShape === 'circle') {
                canvas = getRoundedCanvas(canvas);
                finalType = 'image/png'; // Circles need transparency
                extension = 'png';
            }

            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${originalFileName}-cropped.${extension}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, finalType, 0.95);
        }

        // Drag and drop support
        const dropZone = document.getElementById('editorWorkspace');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-primary', 'border-2', 'border-dashed');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-primary', 'border-2', 'border-dashed');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-primary', 'border-2', 'border-dashed');

            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                const file = e.dataTransfer.files[0];
                if (file.type.startsWith('image/')) {
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    const input = document.getElementById('fileInput');
                    input.files = dataTransfer.files;
                    input.dispatchEvent(new Event('change'));
                }
            }
        });
    </script>
    <script src="../shared.js"></script>
</body>
