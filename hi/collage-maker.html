    <style>
        .glass-panel {

            border: 1px solid rgba(255, 255, 255, 0.08);

        .checkered-bg {
            background-color: #050508;
            background-image:
                linear-gradient(45deg, rgba(255, 255, 255, 0.02) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255, 255, 255, 0.02) 25%, transparent 25%),

            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        #collageContainer {
            box-sizing: content-box;
            background-color: white;
            /* Default border color */
            transition: all 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            aspect-ratio: 1/1;
            /* Default to square collage */
        }

        .layout-btn.active {
            border-color: #7c5cfc;
            color: #7c5cfc;
        }

        .photo-slot {
            position: relative;
            background-color: rgba(255, 255, 255, 0.05);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .photo-slot:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .photo-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* This makes the image fill the slot without distortion */
            pointer-events: none;
        }

        .photo-slot .placeholder-icon {
            position: absolute;
            color: rgba(255, 255, 255, 0.2);
            font-size: 2rem;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .photo-slot.has-image .placeholder-icon {
            opacity: 0;
        }

        .photo-slot .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: auto;
        }

        .photo-slot.has-image:hover .remove-btn {
            opacity: 1;
        }

        /* Sortable ghost styling */
        .sortable-ghost {
            opacity: 0.4;
            transform: scale(0.95);
        }

        /* Range Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #7c5cfc;
            cursor: pointer;
            margin-top: -6px;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
    </style>

    <script>
        const container = document.getElementById('collageContainer');
        let currentSlotCount = 4;
        let activeSlotItem = null; // Tracks which slot was clicked for upload
        let customClassesArray = []; // To handle spans (row-span, col-span)

        // Initialize Sortable logic
        let sortableInstance = null;

        function initSortable() {
            if (sortableInstance) {
                sortableInstance.destroy();
            }
            sortableInstance = new Sortable(container, {
                animation: 150,
                ghostClass: 'sortable-ghost',
                // Keep the span classes associated with their index position, NOT the DOM element moving
                // We actually want images to swap contents, not DOM nodes moving, because of grid-area spanning.
                // SortableJS standard moves the DOM element. To fix this with irregular grids, we intercept the end event.
                onEnd: function (evt) {
                    if (customClassesArray.length > 0) {
                        // If we have irregular grids (spans), DOM reordering messes up the grid template.
                        // So we cancel the DOM move, and just swap the innerHTML/backgrounds manually.

                        // BUT, to keep things simple and robust entirely on client-side, 
                        // It's safer to re-apply classes based on children index.
                        const children = Array.from(container.children);
                        children.forEach((child, index) => {
                            // Strip old spans
                            child.className = child.className.replace(/col-span-\d/g, '').replace(/row-span-\d/g, '');
                            // Re-apply if defined
                            if (customClassesArray[index] && typeof customClassesArray[index] === 'string') {
                                child.className += ' ' + customClassesArray[index];
                            }
                        });
                    }
                }
            });
        }

        // Layout Engine
        function setLayout(gridClasses, slotCount, btnElement, optionalClasses = []) {
            // Update UI
            document.querySelectorAll('.layout-btn').forEach(b => {
                b.classList.remove('active', 'border-primary', 'text-primary');
                b.classList.add('border-white/10', 'text-slate-400');
            });
            btnElement.classList.remove('border-white/10', 'text-slate-400');
            btnElement.classList.add('active', 'border-primary', 'text-primary');

            // Save state
            currentSlotCount = slotCount;
            customClassesArray = optionalClasses;

            // Strip existing grid-cols/rows
            container.className = container.className.replace(/grid-cols-\d/g, '').replace(/grid-rows-\d/g, '');
            // Apply new
            container.className += ' ' + gridClasses;

            // Generate slots, preserving as many images as possible
            const existingImages = [];
            Array.from(container.children).forEach(slot => {
                if (slot.classList.contains('has-image')) {
                    const img = slot.querySelector('img');
                    if (img && img.src) existingImages.push(img.src);
                }
            });

            container.innerHTML = '';
            for (let i = 0; i < currentSlotCount; i++) {
                const slot = document.createElement('div');
                slot.className = 'photo-slot rounded-sm'; // base class

                // Add specific span classes if defined for this Layout
                if (customClassesArray[i] && typeof customClassesArray[i] === 'string') {
                    slot.className += ' ' + customClassesArray[i];
                }

                // Inner content
                const icon = document.createElement('span');
                icon.className = 'material-symbols-outlined placeholder-icon';
                icon.textContent = 'add_photo_alternate';

                const closeBtn = document.createElement('div');
                closeBtn.className = 'remove-btn text-white text-[14px] material-symbols-outlined';
                closeBtn.textContent = 'close';
                closeBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeImage(slot);
                };

                slot.appendChild(icon);
                slot.appendChild(closeBtn);

                // Re-apply old images if we have them
                if (i < existingImages.length) {
                    const img = document.createElement('img');
                    img.src = existingImages[i];
                    slot.appendChild(img);
                    slot.classList.add('has-image');
                }

                // Click to upload
                slot.onclick = () => {
                    if (!slot.classList.contains('has-image')) {
                        activeSlotItem = slot;
                        document.getElementById('slotFileInput').click();
                    }
                };

                container.appendChild(slot);
            }

            // Sync border radius immediately so new slots get the rounded corners
            updateBorders();
            initSortable();
        }

        // Image Handling
        function handleSlotUpload(event) {
            const file = event.target.files[0];
            if (!file || !activeSlotItem) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result;
                activeSlotItem.appendChild(img);
                activeSlotItem.classList.add('has-image');
                activeSlotItem = null; // reset
                event.target.value = ''; // clear input
            };
            reader.readAsDataURL(file);
        }

        function removeImage(slotNode) {
            const img = slotNode.querySelector('img');
            if (img) {
                slotNode.removeChild(img);
                slotNode.classList.remove('has-image');
            }
        }

        // Ratio Controls
        function setCollageRatio(ratio, btnElement) {
            container.style.aspectRatio = ratio;

            document.querySelectorAll('.ratio-btn').forEach(b => {
                b.classList.remove('bg-white/10', 'text-white');
                b.classList.add('text-slate-400');
            });
            btnElement.classList.add('bg-white/10', 'text-white');
            btnElement.classList.remove('text-slate-400');
        }

        // Styling Controls
        function updateBorders() {
            const gap = document.getElementById('gapSize').value;
            const radius = document.getElementById('radiusSize').value;

            document.getElementById('gapVal').textContent = gap + 'px';
            document.getElementById('radiusVal').textContent = radius + 'px';

            container.style.gap = `${gap}px`;
            container.style.padding = `${gap}px`;
            container.style.borderRadius = `${(radius * 1.5)}px`; // slightly larger outer radius

            // Inner slots radius
            Array.from(container.children).forEach(slot => {
                slot.style.borderRadius = `${radius}px`;
            });
        }

        function setBorderColor(color) {
            if (color === 'transparent') {
                container.style.backgroundColor = 'transparent';
            } else {
                container.style.backgroundColor = color;
            }

            // UI update for swatches
            const swatches = ['cc-white', 'cc-black', 'cc-gray', 'cc-primary', 'cc-trans'];
            swatches.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.remove('scale-110', 'shadow-lg');
                    el.blur(); // remove focus ring
                }
            });

            // If it matches a swatch, highlight it
            let activeId = null;
            if (color === '#ffffff') activeId = 'cc-white';
            else if (color === '#000000') activeId = 'cc-black';
            else if (color === '#f3f4f6') activeId = 'cc-gray';
            else if (color === '#7c5cfc') activeId = 'cc-primary';
            else if (color === 'transparent') activeId = 'cc-trans';

            if (activeId) {
                const el = document.getElementById(activeId);
                el.classList.add('scale-110', 'shadow-lg');
                el.focus();
            }
        }

        // Export Function using html2canvas
        function downloadCollage() {
            // Verify at least one image exists
            const hasImages = Array.from(container.children).some(slot => slot.classList.contains('has-image'));
            if (!hasImages) {
                alert("Please add at least one image to export your collage.");
                return;
            }

            const btn = document.getElementById('btnDownload');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> Generating...`;
            btn.disabled = true;

            // Temporarily hide close buttons and placeholders
            const closeBtns = document.querySelectorAll('.remove-btn');
            const icons = document.querySelectorAll('.placeholder-icon');
            closeBtns.forEach(el => el.style.display = 'none');
            icons.forEach(el => el.style.display = 'none');

            // To ensure high quality, scale up the canvas rendering
            container.style.boxShadow = 'none'; // remove shadow for export

            html2canvas(container, {
                scale: 3, // High resolution
                useCORS: true,
                backgroundColor: null, // respect transparency
                logging: false,
                onclone: function (clonedDoc) {
                    // Fix iOS safari glitch where flex items might collapse
                    const clonedContainer = clonedDoc.getElementById('collageContainer');
                    clonedContainer.style.width = container.offsetWidth + 'px';
                    clonedContainer.style.height = container.offsetHeight + 'px';
                }
            }).then(canvas => {
                // Restore UI
                closeBtns.forEach(el => el.style.display = '');
                icons.forEach(el => el.style.display = '');
                container.style.boxShadow = '0 25px 50px -12px rgba(0, 0, 0, 0.5)';
                btn.innerHTML = originalText;
                btn.disabled = false;

                // Download
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `studiolimb-collage.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 'image/png', 1.0);
            }).catch(err => {
                console.error(err);
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert("An error occurred during export.");
            });
        }

        // Initialize default view
        window.addEventListener('DOMContentLoaded', () => {
            // Force the first button click to setup DOM
            document.querySelector('.layout-btn.active').click();
        });

    </script>
    <script src="../shared.js"></script>
</body>

</html>
