        /* Range Slider Styling */

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;

            width: 16px;
            border-radius: 50%;

        #previewImage {

        }

        .filter-preset:hover {
            border-color: rgba(255, 255, 255, 0.3);
        }

<body class="bg-background-dark font-display text-slate-100 antialiased h-screen overflow-hidden flex flex-col">

    <header

        <div class="flex items-center gap-3">

                class="flex h-10 w-10 items-center justify-center rounded-lg bg-amber-500/20 text-amber-400 border border-amber-500/30">

            </div>
            <div>
                <h2 class="text-lg font-bold leading-tight tracking-tight">फोटो फिल्टर और प्रभाव</h2>

            </div>
        </div>
        <div class="flex items-center gap-3">
            <button id="btnDownload" onclick="downloadImage()" disabled

                <span class="material-symbols-outlined text-[18px]">download</span> Export Image

        </div>
    </header>

    <main class="relative z-10 flex flex-1 overflow-hidden px-4 pb-4 gap-6">

        <!-- Sidebar Controls -->
        <div class="flex w-80 flex-col gap-4 h-full shrink-0">
            <div class="flex flex-col flex-1 glass-panel p-5 rounded-xl overflow-y-auto scrollbar-hide">
                <div class="space-y-6">

                    <!-- Upload Input -->
                    <div id="uploadSection" class="relative group cursor-pointer"
                        onclick="document.getElementById('fileInput').click()">
                        <div
                            class="absolute inset-0 bg-primary/20 rounded-xl blur-xl group-hover:bg-primary/30 transition-all">
                        </div>
                        <div
                            class="relative flex flex-col items-center justify-center py-6 px-4 border-2 border-dashed border-primary/50 rounded-xl bg-[#050508] text-center hover:border-primary transition-colors">
                            <span
                                class="material-symbols-outlined text-3xl text-primary mb-1">add_photo_alternate</span>
                            <span class="text-xs font-bold text-slate-200">अपलोड करें</span>
                        </div>
                        <input type="file" id="fileInput" accept="image/*" class="hidden"
                            onchange="handleImageUpload(event)">
                    </div>

                    <div id="controlsSection" class="opacity-50 pointer-events-none transition-opacity space-y-6">

                        <!-- Quick Presets -->
                        <div>
                            <label
                                class="text-[10px] uppercase tracking-wider font-bold text-slate-500 block mb-3">Instagram-style
                                Presets</label>
                            <div class="grid grid-cols-2 gap-2" id="presetContainer">
                                <button onclick="applyPreset('none', this)"
                                    class="filter-preset active p-2 border border-white/10 rounded-lg text-xs font-bold text-center bg-white/5">सामान्य</button>
                                <button onclick="applyPreset('vintage', this)"
                                    class="filter-preset p-2 border border-white/10 rounded-lg text-xs font-bold text-center bg-white/5">विंटेज</button>
                                <button onclick="applyPreset('lark', this)"
                                    class="filter-preset p-2 border border-white/10 rounded-lg text-xs font-bold text-center bg-white/5">लार्क</button>
                                <button onclick="applyPreset('moon', this)"
                                    class="filter-preset p-2 border border-white/10 rounded-lg text-xs font-bold text-center bg-white/5">बी एंड डब्ल्यू</button>
                                <button onclick="applyPreset('clarendon', this)"
                                    class="filter-preset p-2 border border-white/10 rounded-lg text-xs font-bold text-center bg-white/5">क्लेरेंडन</button>
                                <button onclick="applyPreset('sepia', this)"
                                    class="filter-preset p-2 border border-white/10 rounded-lg text-xs font-bold text-center bg-white/5">सेपिया</button>
                            </div>
                        </div>

                        <!-- Manual Adjustments -->
                        <div class="pt-4 border-t border-white/5 space-y-5">
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500 block">Fine
                                    Tuning</label>
                                <button onclick="resetSliders()"
                                    class="text-[10px] hover:text-primary text-slate-400 font-bold transition-colors">RESET</button>
                            </div>

                            <!-- Brightness -->
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs text-slate-300">चमक</span>
                                    <span class="text-xs font-mono text-primary" id="val-brightness">100%</span>
                                </div>
                                <input type="range" id="filter-brightness" data-unit="%" min="0" max="200" value="100"
                                    class="filter-slider">
                            </div>

                            <!-- Contrast -->
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs text-slate-300">कंट्रास्ट</span>
                                    <span class="text-xs font-mono text-primary" id="val-contrast">100%</span>
                                </div>
                                <input type="range" id="filter-contrast" data-unit="%" min="0" max="200" value="100"
                                    class="filter-slider">
                            </div>

                            <!-- Saturation -->
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs text-slate-300">संतृप्ति</span>
                                    <span class="text-xs font-mono text-primary" id="val-saturate">100%</span>
                                </div>
                                <input type="range" id="filter-saturate" data-unit="%" min="0" max="200" value="100"
                                    class="filter-slider">
                            </div>

                            <!-- Hue Rotate -->
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs text-slate-300">Hue</span>
                                    <span class="text-xs font-mono text-primary" id="val-hue-rotate">0deg</span>
                                </div>
                                <input type="range" id="filter-hue-rotate" data-unit="deg" min="0" max="360" value="0"
                                    class="filter-slider">
                            </div>

                            <!-- Blur -->
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs text-slate-300">धुंधलापन</span>
                                    <span class="text-xs font-mono text-primary" id="val-blur">0px</span>
                                </div>
                                <input type="range" id="filter-blur" data-unit="px" min="0" max="20" step="0.5"
                                    value="0" class="filter-slider">
                            </div>

                            <!-- Grayscale -->
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs text-slate-300">ग्रेस्केल</span>
                                    <span class="text-xs font-mono text-primary" id="val-grayscale">0%</span>
                                </div>
                                <input type="range" id="filter-grayscale" data-unit="%" min="0" max="100" value="0"
                                    class="filter-slider">
                            </div>

                            <!-- Sepia -->
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs text-slate-300">Sepia Tone</span>
                                    <span class="text-xs font-mono text-primary" id="val-sepia">0%</span>
                                </div>
                                <input type="range" id="filter-sepia" data-unit="%" min="0" max="100" value="0"
                                    class="filter-slider">
                            </div>

                            <!-- Invert -->
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs text-slate-300">Invert Colors</span>
                                    <span class="text-xs font-mono text-primary" id="val-invert">0%</span>
                                </div>
                                <input type="range" id="filter-invert" data-unit="%" min="0" max="100" value="0"
                                    class="filter-slider">
                            </div>

                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Central Work Area -->
        <div
            class="flex-1 glass-panel rounded-xl flex items-center justify-center overflow-hidden relative checkered-bg p-8">
            <div id="editorPlaceholder" class="flex flex-col items-center text-slate-500 gap-4">
                <span class="material-symbols-outlined text-6xl opacity-20">photo_filter</span>
                <p class="text-sm">Upload an image to apply filters</p>
            </div>
            <!-- The actual image we will style with CSS filters -->
            <img id="previewImage" class="hidden" src="" alt="Filter Preview">

            <!-- Hidden canvas used ONLY for exporting the final composed image -->
            <canvas id="exportCanvas" class="hidden"></canvas>
        </div>
    </main>

    <script>
        const previewImage = document.getElementById('previewImage');
        const sliders = document.querySelectorAll('.filter-slider');

        let originalFileName = 'filtered-image';
        let originalFileType = 'image/jpeg';
        let currentFilterString = '';

        // Default slider values
        const defaults = {
            'filter-brightness': 100,
            'filter-contrast': 100,
            'filter-saturate': 100,
            'filter-hue-rotate': 0,
            'filter-blur': 0,
            'filter-grayscale': 0,
            'filter-sepia': 0,
            'filter-invert': 0
        };

        const presets = {
            'none': { ...defaults },
            'vintage': { ...defaults, 'filter-sepia': 50, 'filter-contrast': 120, 'filter-brightness': 90 },
            'lark': { ...defaults, 'filter-brightness': 108, 'filter-contrast': 90, 'filter-saturate': 130 },
            'moon': { ...defaults, 'filter-grayscale': 100, 'filter-contrast': 110, 'filter-brightness': 110 },
            'clarendon': { ...defaults, 'filter-contrast': 120, 'filter-saturate': 125 },
            'sepia': { ...defaults, 'filter-sepia': 100 }
        };

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            originalFileName = file.name.split('.')[0];
            originalFileType = file.type;

            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                document.getElementById('editorPlaceholder').classList.add('hidden');
                previewImage.classList.remove('hidden');
                document.getElementById('controlsSection').classList.remove('opacity-50', 'pointer-events-none');
                document.getElementById('btnDownload').disabled = false;

                // Reset to normal on new image
                document.getElementById('presetContainer').firstElementChild.click();
            };
            reader.readAsDataURL(file);
        }

        function updateFilters() {
            let filterStr = '';
            sliders.forEach(slider => {
                const name = slider.id.replace('filter-', '');
                const val = slider.value;
                const unit = slider.getAttribute('data-unit');
                filterStr += `${name}(${val}${unit}) `;

                // Update UI label
                document.getElementById(`val-${name}`).textContent = val + unit;
            });

            currentFilterString = filterStr.trim();
            previewImage.style.filter = currentFilterString;
        }

        // Attach listeners to sliders
        sliders.forEach(slider => {
            slider.addEventListener('input', () => {
                // If user touches a slider, remove active class from presets
                document.querySelectorAll('.filter-preset').forEach(b => b.classList.remove('active'));
                updateFilters();
            });
        });

        function applyPreset(presetName, btnElement) {
            const settings = presets[presetName];

            // Update sliders to match preset
            sliders.forEach(slider => {
                slider.value = settings[slider.id];
            });

            // Update UI
            document.querySelectorAll('.filter-preset').forEach(b => b.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');

            updateFilters();
        }

        function resetSliders() {
            applyPreset('none');
            // Re-highlight "सामान्य" preset
            document.getElementById('presetContainer').firstElementChild.classList.add('active');
        }

        function downloadImage() {
            if (!previewImage.src) return;

            // To export an image with CSS filters, we must draw it to a canvas 
            // and apply the ctx.filter property before drawing.
            const canvas = document.getElementById('exportCanvas');
            const ctx = canvas.getContext('2d');

            canvas.width = previewImage.naturalWidth;
            canvas.height = previewImage.naturalHeight;

            // Apply the exact CSS filter string we built to the canvas context
            ctx.filter = currentFilterString;

            // Draw image. The filter is applied during drawing.
            ctx.drawImage(previewImage, 0, 0, canvas.width, canvas.height);

            // Export
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${originalFileName}-filtered.${originalFileType.split('/')[1]}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, originalFileType, 0.95);
        }

    </script>
    <script src="../shared.js"></script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js")}</script>
