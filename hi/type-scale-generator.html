    <style>

        select {

            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }

        .scale-item {
            transition: all 0.3s ease;
            position: relative;
        }

        .scale-item:hover {
            transform: translateX(10px);
            color: #fff;
        }

        .scale-line {
            position: absolute;
            left: -20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #7c5cfc;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .scale-item:hover .scale-line {
            opacity: 1;
        }
    </style>

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col">
        <!-- Main Background Canvas -->
        <div class="absolute inset-0 z-0 canvas-container"></div>

        <!-- Top Navigation Bar -->
        <header class="relative z-20 flex items-center justify-between px-6 py-4 glass-panel m-4 rounded-xl shadow-2xl">
            <div class="flex items-center gap-3">
                <div
                    class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined">format_size</span>
                </div>
                <div>
                    <h2 class="text-lg font-bold leading-tight tracking-tight">StudioLimb</h2>
                    <p class="text-[10px] uppercase tracking-widest font-semibold opacity-60">Typography Suite</p>
                </div>
            </div>
            <button
                class="flex h-10 px-6 items-center justify-center rounded-xl bg-white/10 hover:bg-white/20 text-white text-sm font-bold transition-all border border-white/10"
                onclick="copyCSS()">
                <span class="material-symbols-outlined text-[18px] mr-2">content_copy</span> Export CSS
            </button>
        </header>

        <main class="relative z-10 flex flex-1 overflow-hidden px-4 pb-4 gap-6">

            <!-- Sidebar Controls -->
            <div class="flex w-[350px] flex-col gap-4 h-full">
                <div class="flex flex-col gap-4 glass-panel p-6 rounded-xl overflow-y-auto scrollbar-hide h-full">
                    <div>
                        <h1 class="text-xl font-bold mb-1">टाइप स्केल</h1>
                        <p class="text-xs text-slate-400 font-medium leading-relaxed">Ensure visual rhythm and harmony
                            using mathematical ratios.</p>
                    </div>

                    <div class="h-px bg-white/10 my-2"></div>

                    <!-- Controls -->
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label
                                class="text-[10px] uppercase tracking-wider font-bold text-slate-500 flex justify-between">
                                Base Size <span>(px)</span>
                            </label>
                            <input type="number" id="baseSize" value="16" min="8" max="48" oninput="renderScale()"
                                class="w-full bg-[#050508] border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-mono">
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Scale
                                Ratio</label>
                            <select id="scaleRatio" onchange="renderScale()"
                                class="w-full bg-[#050508] border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:border-primary outline-none transition-all cursor-pointer">
                                <option value="1.067" class="bg-[#050508]">Minor Second (1.067)</option>
                                <option value="1.125" class="bg-[#050508]">Major Second (1.125)</option>
                                <option value="1.200" class="bg-[#050508]">Minor Third (1.200)</option>
                                <option value="1.250" class="bg-[#050508]" selected>Major Third (1.250)</option>
                                <option value="1.333" class="bg-[#050508]">Perfect Fourth (1.333)</option>
                                <option value="1.414" class="bg-[#050508]">Augmented Fourth (1.414)</option>
                                <option value="1.500" class="bg-[#050508]">Perfect Fifth (1.500)</option>
                                <option value="1.618" class="bg-[#050508]">Golden Ratio (1.618)</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Preview
                                Text</label>
                            <input type="text" id="previewInput" value="Aesthetic Precision" oninput="renderScale()"
                                class="w-full bg-[#050508] border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:border-primary outline-none transition-all">
                        </div>
                    </div>

                    <div class="mt-auto pt-6">
                        <div class="bg-white/5 border border-white/5 p-4 rounded-xl">
                            <h3 class="text-xs font-bold mb-2">कोड निर्यात करें</h3>
                            <pre id="codeOutput"
                                class="text-[10px] font-mono text-sky-300 whitespace-pre-wrap leading-relaxed opacity-80 h-32 overflow-y-auto scrollbar-hide"></pre>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Central Content Stage -->
            <div class="flex-1 glass-panel rounded-xl flex flex-col relative overflow-hidden bg-[#0a0a0f]/80">
                <div class="flex-1 overflow-y-auto p-12 md:p-20">
                    <div id="scaleContainer" class="max-w-4xl mx-auto space-y-8 pb-12">
                        <!-- Items Filled by JS -->
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        const container = document.getElementById('scaleContainer');
        const codeOutput = document.getElementById('codeOutput');

        const labels = ['h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'p', 'small'];
        const powers = [4, 3, 2, 1, 0, -1, -2, -3];

        function renderScale() {
            const base = parseFloat(document.getElementById('baseSize').value) || 16;
            const ratio = parseFloat(document.getElementById('scaleRatio').value);
            const text = document.getElementById('previewInput').value || 'Aesthetic Precision';

            container.innerHTML = '';
            let css = ':root {\n';

            powers.forEach((p, i) => {
                const sizePx = base * Math.pow(ratio, p);
                const sizeRem = (sizePx / base).toFixed(3);
                const label = labels[i];
                const isBase = label === 'p';

                const item = document.createElement('div');
                item.className = 'scale-item flex flex-col md:flex-row md:items-baseline gap-2 md:gap-12 pb-8 border-b border-white/5 relative';
                if (isBase) item.classList.add('opacity-100');
                else item.classList.add('opacity-80');

                item.innerHTML = `
                    <div class="scale-line"></div>
                    <div class="w-32 flex-shrink-0">
                        <div class="text-[10px] uppercase tracking-widest font-bold text-slate-500 mb-1">${label}</div>
                        <div class="font-mono text-xs text-primary font-bold bg-primary/10 inline-block px-2 py-1 rounded">
                            ${sizePx.toFixed(1)}px
                        </div>
                        <div class="font-mono text-[10px] text-slate-400 mt-1 pl-1">${sizeRem}rem</div>
                    </div>
                    <div class="flex-1 font-bold leading-tight truncate text-slate-200" style="font-size: ${sizePx}px; ${label === 'p' || label === 'small' ? 'font-weight: 400;' : ''}">${text}</div>
                `;
                container.appendChild(item);

                css += `  --text-${label}: ${sizeRem}rem;\n`;
            });

            css += '}';
            codeOutput.innerText = css;
        }

        function copyCSS() {
            navigator.clipboard.writeText(codeOutput.innerText).then(() => {
                const btn = document.querySelector('header button');
                const origHTML = btn.innerHTML;
                btn.innerHTML = '<span class="material-symbols-outlined text-[18px] mr-2">check</span> कॉपी किया गया!';
                btn.classList.add('bg-green-500/20', 'text-green-400', 'border-green-500/30');
                setTimeout(() => {
                    btn.innerHTML = origHTML;
                    btn.classList.remove('bg-green-500/20', 'text-green-400', 'border-green-500/30');
                }, 2000);
            });
        }

        renderScale();
    </script>
    <script src="../shared.js"></script>
</body>

</html>
