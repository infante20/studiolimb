<head>

    <style>

            background: rgba(255, 255, 255, 0.03);

        }

        /* Specialized Inputs */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;

        }

        input[type="number"] {

        }

        .input-ring {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        .input-ring:focus-within {
            border-color: #7c5cfc;
            box-shadow: 0 0 0 4px rgba(124, 92, 252, 0.15);
        }

        /* Data Table Rows */
        .table-row {
            transition: background 0.2s, transform 0.2s;
        }

        .table-row:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(4px);
        }
    </style>
    <link rel="canonical" href="https://studiolimb.com/px-rem-converter.html">
    <meta name="description" content="Convierte valores px a rem al instante para hojas de estilo responsivas.">
    <link rel="alternate" hreflang="x-default" href="https://studiolimb.com/px-rem-converter.html" />
    <link rel="alternate" hreflang="en" href="https://studiolimb.com/px-rem-converter.html" />
    <link rel="alternate" hreflang="es" href="https://studiolimb.com/es/px-rem-converter.html" />
    <link rel="alternate" hreflang="fr" href="https://studiolimb.com/fr/px-rem-converter.html" />
    <link rel="alternate" hreflang="hi" href="https://studiolimb.com/hi/px-rem-converter.html" />
    <link rel="alternate" hreflang="pt-BR" href="https://studiolimb.com/pt/px-rem-converter.html" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://studiolimb.com/es/px-rem-converter.html" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Convert pixel values to rem units for scalable, responsive CSS typography. Set your base font size and convert in bulk." />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "PX to REM Converter",
      "description": "Convert pixel values to rem units for scalable, responsive CSS typography. Set your base font size and convert in bulk.",
      "url": "https://studiolimb.com/es/px-rem-converter.html",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "All",
      "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"},
      "featureList": "px to rem, rem converter, css units, pixel rem conversion"
    }

</head>

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col">
        <!-- Main Background Canvas -->
        <div class="absolute inset-0 z-0 canvas-container"></div>

        <!-- Top Navigation Bar -->
        <header class="relative z-20 flex items-center justify-between px-6 py-4 glass-panel m-4 rounded-xl shadow-2xl">
            <div class="flex items-center gap-3">
                <div
                    class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined">sync_alt</span>
                </div>
                <div>
                    <h2 class="text-lg font-bold leading-tight tracking-tight">StudioLimb</h2>
                    <p class="text-[10px] uppercase tracking-widest font-semibold opacity-60">Typography Suite</p>
                </div>
            </div>

            <div
                class="flex items-center gap-2 bg-[#050508]/80 border border-white/10 px-4 py-1.5 rounded-full overflow-hidden">
                <span class="text-[10px] uppercase font-bold tracking-widest text-slate-500">HTML Base Size:</span>
                <input type="number" id="baseSize" value="16" min="1" max="100"
                    class="w-10 bg-transparent text-primary font-code font-bold text-sm text-center outline-none border-b border-white/20 focus:border-primary p-0"
                    oninput="convert('px')">
                <span class="text-[10px] font-bold text-slate-400">px</span>
            </div>
        </header>

        <main class="relative z-10 flex flex-1 overflow-hidden px-4 pb-4">

            <!-- Central Stage -->
            <div
                class="w-full glass-panel rounded-2xl flex flex-col relative overflow-hidden bg-[#0a0a0f]/90 shadow-2xl max-w-5xl mx-auto">
                <div class="absolute inset-0 opacity-[0.03]"
                    style="background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px); background-size: 40px 40px;">
                </div>

                <div class="flex-1 flex flex-col md:flex-row h-full relative z-10">

                    <!-- Left: Converter Module -->
                    <div
                        class="flex-1 p-8 md:p-12 border-b md:border-b-0 md:border-r border-white/10 flex flex-col justify-center gap-12">

                        <div class="mb-2">
                            <h1 class="text-xl font-bold">PX &harr; REM Converter</h1>
                            <p class="text-sm font-medium text-slate-400">Instantly convert typography values
                                side-by-side.</p>
                        </div>

                        <!-- Converter Core -->
                        <div class="flex flex-col gap-6 relative">

                            <!-- Exchange Graphic -->
                            <div
                                class="absolute inset-y-0 left-10 md:left-[2.75rem] w-px bg-white/10 z-0 hidden md:block">
                            </div>

                            <!-- PX Input Block -->
                            <div
                                class="relative z-10 bg-[#050508]/80 shadow-2xl shadow-black/50 rounded-2xl p-6 input-ring backdrop-blur-md flex items-center gap-4">
                                <div
                                    class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center shrink-0 border border-white/10">
                                    <span class="text-xs font-black tracking-wider text-slate-300">PX</span>
                                </div>
                                <div class="flex-1">
                                    <input type="number" id="pxInput" value="16" step="1"
                                        class="w-full bg-transparent border-none text-4xl font-code font-bold text-white p-0 outline-none focus:ring-0 placeholder-white/20"
                                        placeholder="0" oninput="convert('px')">
                                </div>
                                <button
                                    class="w-10 h-10 rounded-lg hover:bg-white/10 text-slate-400 hover:text-white transition-colors flex items-center justify-center"
                                    onclick="copyValue('pxInput')" title="Copy PX">
                                    <span class="material-symbols-outlined text-[20px]">content_copy</span>
                                </button>
                            </div>

                            <div class="flex justify-center -my-2 relative z-20">
                                <div
                                    class="w-10 h-10 rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/40 border-[3px] border-[#0a0a0f]">
                                    <span class="material-symbols-outlined text-white text-[20px]">swap_vert</span>
                                </div>
                            </div>

                            <!-- REM Input Block -->
                            <div
                                class="relative z-10 bg-[#050508]/80 shadow-2xl shadow-black/50 rounded-2xl p-6 input-ring backdrop-blur-md flex items-center gap-4">
                                <div
                                    class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center shrink-0 border border-primary/20">
                                    <span class="text-xs font-black tracking-wider text-primary">REM</span>
                                </div>
                                <div class="flex-1">
                                    <input type="number" id="remInput" value="1" step="0.0625"
                                        class="w-full bg-transparent border-none text-4xl font-code font-bold text-primary p-0 outline-none focus:ring-0 placeholder-primary/20 drop-shadow-md"
                                        placeholder="0" oninput="convert('rem')">
                                </div>
                                <button
                                    class="w-10 h-10 rounded-lg hover:bg-white/10 text-slate-400 hover:text-white transition-colors flex items-center justify-center"
                                    onclick="copyValue('remInput')" title="Copy REM">
                                    <span class="material-symbols-outlined text-[20px]">content_copy</span>
                                </button>
                            </div>

                        </div>
                    </div>

                    <!-- Right: Quick Reference Table -->
                    <div class="w-full md:w-[380px] bg-[#050508]/40 p-6 flex flex-col h-full overflow-hidden">

                        <div class="flex items-center justify-between mb-6 pb-4 border-b border-white/10">
                            <h3 class="text-sm font-bold uppercase tracking-widest text-slate-300">Scale Reference</h3>
                            <button
                                class="text-[10px] font-bold text-primary hover:text-white transition-colors uppercase tracking-widest"
                                onclick="renderTable()">Refresh</button>
                        </div>

                        <div class="flex-1 overflow-y-auto w-full pr-2 scrollbar-hide">
                            <div class="flex flex-col w-full" id="tableBody">
                                <!-- Data rows injected here -->
                            </div>
                        </div>

                    </div>

                </div>
            </div>

        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast"
        class="fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 bg-white text-black font-bold px-6 py-3 rounded-full flex items-center gap-2 shadow-2xl z-50 pointer-events-none">
        <span class="material-symbols-outlined text-primary text-[20px]">check_circle</span>
        <span>Copied: <code class="font-code text-primary bg-primary/10 px-1 rounded ml-1"
                id="toastData">1.5rem</code></span>
    </div>

    <script>
        const pxInput = document.getElementById('pxInput');
        const remInput = document.getElementById('remInput');
        const baseInput = document.getElementById('baseSize');
        const tableBody = document.getElementById('tableBody');

        function convert(source) {
            const base = parseFloat(baseInput.value) || 16;
            if (base <= 0) return;

            if (source === 'px') {
                const px = parseFloat(pxInput.value) || 0;
                remInput.value = (px / base).toFixed(4).replace(/\.?0+$/, '');
            } else {
                const rem = parseFloat(remInput.value) || 0;
                pxInput.value = Math.round(rem * base);
            }
            renderTable();
        }

        function renderTable() {
            const base = parseFloat(baseInput.value) || 16;
            if (base <= 0) return;

            // Typical Tailwind/Material scale
            const sizes = [12, 14, 16, 18, 20, 24, 32, 40, 48, 64, 80, 96, 128];
            tableBody.innerHTML = '';

            sizes.forEach(px => {
                const rem = (px / base).toFixed(4).replace(/\.?0+$/, '');

                const isBase = px === 16;
                const highlightClass = isBase ? 'bg-primary/5 border border-primary/20' : 'border-b border-white/5';

                const rowHtml = `
                    <div class="table-row flex items-center justify-between py-3 px-4 rounded-lg cursor-pointer group ${highlightClass}" onclick="triggerCopy('${rem}rem')">
                        <div class="flex items-center gap-6">
                            <span class="font-code text-sm font-medium text-slate-300 w-12 text-right">${px}px</span>
                            <span class="text-white/20">|</span>
                            <span class="font-code text-sm font-bold text-white group-hover:text-primary transition-colors">${rem}rem</span>
                        </div>
                        <span class="material-symbols-outlined text-[16px] text-white/0 group-hover:text-white/30 transition-colors">content_copy</span>
                    </div>
                `;
                tableBody.insertAdjacentHTML('beforeend', rowHtml);
            });
        }

        function copyValue(inputId) {
            const val = document.getElementById(inputId).value;
            const unit = inputId === 'pxInput' ? 'px' : 'rem';
            triggerCopy(val + unit);
        }

        function triggerCopy(val) {
            navigator.clipboard.writeText(val).then(() => {
                const toast = document.getElementById('toast');
                document.getElementById('toastData').innerText = val;
                toast.classList.remove('translate-y-20', 'opacity-0');
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 2000);
            });
        }

        // Init
        convert('px');
    </script>
    <script src="../shared.js"></script>
</body>

</html>
