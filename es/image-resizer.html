<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>StudioLimb | Resizer Premier</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7c5cfc",
                        "background-light": "#f8f6f6",
                        "background-dark": "#050508",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                    },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .canvas-container {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
        }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drop-zone:hover,
        .drop-zone.active {
            border-color: #7c5cfc;
            background: rgba(124, 92, 252, 0.05);
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
    </style>
    <link rel="canonical" href="https://studiolimb.com/image-resizer.html">
    <meta name="description" content="Redimensiona imágenes en píxeles de forma rápida conservando el aspect ratio.">
</head>

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col">
        <!-- Main Background Canvas -->
        <div class="absolute inset-0 z-0 canvas-container"></div>

        <!-- Top Navigation Bar -->
        <header class="relative z-20 flex items-center justify-between px-6 py-4 glass-panel m-4 rounded-xl shadow-2xl">
            <div class="flex items-center gap-3">
                <div
                    class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined">photo_size_select_large</span>
                </div>
                <div>
                    <h2 class="text-lg font-bold leading-tight tracking-tight">StudioLimb</h2>
                    <p class="text-[10px] uppercase tracking-widest font-semibold opacity-60">Media Suite</p>
                </div>
            </div>
            <button
                class="flex h-10 px-6 items-center justify-center rounded-xl bg-white/10 hover:bg-white/20 text-white text-sm font-bold transition-all border border-white/10"
                onclick="location.reload()">
                <span class="material-symbols-outlined text-[18px] mr-2">restart_alt</span> Start Over
            </button>
        </header>

        <main class="relative z-10 flex flex-1 overflow-hidden px-4 pb-4 gap-6">

            <!-- Sidebar Controls -->
            <div class="flex w-[380px] flex-col gap-4 h-full hidden" id="sidebar">
                <div class="flex flex-col gap-4 glass-panel p-6 rounded-xl overflow-y-auto scrollbar-hide h-full">
                    <div>
                        <h1 class="text-xl font-bold mb-1">Image Resizer</h1>
                        <p class="text-xs text-slate-400 font-medium">Resize perfectly down to the pixel.</p>
                    </div>

                    <div class="h-px bg-white/10 my-1"></div>

                    <!-- Custom Dimensions -->
                    <div class="space-y-4">
                        <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500 block">Custom
                            Dimensions</label>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-[#0a0a0f]/80 p-3 rounded-xl border border-white/5 relative">
                                <label
                                    class="text-[10px] uppercase tracking-wider font-bold text-slate-500 mb-1 block">Width
                                    (px)</label>
                                <input type="number" id="widthInput"
                                    class="w-full bg-transparent text-xl font-mono font-bold text-white border-none p-0 focus:ring-0 appearance-none">
                            </div>
                            <div class="bg-[#0a0a0f]/80 p-3 rounded-xl border border-white/5 relative">
                                <label
                                    class="text-[10px] uppercase tracking-wider font-bold text-slate-500 mb-1 block">Height
                                    (px)</label>
                                <input type="number" id="heightInput"
                                    class="w-full bg-transparent text-xl font-mono font-bold text-white border-none p-0 focus:ring-0 appearance-none">
                            </div>
                        </div>

                        <label class="flex items-center gap-3 cursor-pointer group mt-2">
                            <div class="relative flex items-center justify-center">
                                <input type="checkbox" id="ratioToggle" checked class="peer sr-only">
                                <div
                                    class="w-5 h-5 rounded border border-white/20 bg-black/50 peer-checked:bg-primary peer-checked:border-primary transition-all">
                                </div>
                                <span
                                    class="material-symbols-outlined text-white text-[14px] absolute pointer-events-none opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                            </div>
                            <span
                                class="text-sm font-semibold text-slate-300 group-hover:text-white transition-colors">Maintain
                                aspect ratio</span>
                        </label>
                    </div>

                    <div class="h-px bg-white/10 my-1"></div>

                    <!-- Quick Scale -->
                    <div class="space-y-3">
                        <label class="text-[10px] uppercase tracking-wider font-bold text-slate-500 block">Quick
                            Scale</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="scaleBy(0.75)"
                                class="py-2.5 rounded-lg font-bold text-sm bg-white/5 hover:bg-white/10 border border-white/10 transition-colors">75%</button>
                            <button onclick="scaleBy(0.50)"
                                class="py-2.5 rounded-lg font-bold text-sm bg-white/5 hover:bg-white/10 border border-white/10 transition-colors">50%</button>
                            <button onclick="scaleBy(0.25)"
                                class="py-2.5 rounded-lg font-bold text-sm bg-white/5 hover:bg-white/10 border border-white/10 transition-colors">25%</button>
                        </div>
                    </div>

                    <!-- Action Button -->
                    <div class="mt-auto space-y-3 pt-6">
                        <button
                            class="w-full h-14 rounded-xl bg-primary text-white text-base font-bold shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all border border-primary/50 flex items-center justify-center gap-2"
                            id="downloadBtn">
                            <span class="material-symbols-outlined text-[20px]">download</span> Resize & Download
                        </button>
                    </div>
                </div>
            </div>

            <!-- Central Content Stage -->
            <div class="flex-1 glass-panel rounded-xl flex flex-col relative overflow-hidden bg-[#0a0a0f]/90">

                <!-- Initial State: Drop Zone -->
                <div class="flex-1 flex items-center justify-center p-8" id="dropZoneContainer">
                    <div class="w-full max-w-2xl aspect-[3/2] drop-zone rounded-3xl flex flex-col items-center justify-center bg-[#050508]/50 gap-4"
                        id="dropZone">
                        <div
                            class="w-20 h-20 rounded-full bg-primary/10 text-primary flex items-center justify-center border border-primary/20 mb-2 shadow-xl shadow-primary/5">
                            <span class="material-symbols-outlined text-[40px]">aspect_ratio</span>
                        </div>
                        <h2 class="text-3xl font-bold tracking-tight">Suelta tu imagen aquí</h2>
                        <button
                            class="mt-4 px-8 py-3 rounded-full bg-white text-black font-bold text-sm hover:scale-105 transition-transform shadow-lg shadow-white/10">Browse
                            Files</button>
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                    </div>
                </div>

                <!-- Active State: Workspace -->
                <div class="flex-1 flex-col hidden h-full p-4 md:p-6" id="workspaceContainer">

                    <!-- Stats Bar -->
                    <div
                        class="flex gap-4 mb-4 justify-between items-center bg-[#050508]/80 backdrop-blur-md border border-white/10 px-6 py-4 rounded-xl">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center">
                                <span class="material-symbols-outlined text-slate-400">image</span>
                            </div>
                            <div>
                                <p class="text-[10px] uppercase font-bold text-slate-500">Original Resolution</p>
                                <p class="text-sm font-mono font-bold" id="origRes">0 x 0</p>
                            </div>
                        </div>

                        <span class="material-symbols-outlined text-primary/50 text-[24px]">arrow_forward</span>

                        <div class="flex items-center gap-3">
                            <div
                                class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center shadow-inner shadow-primary/20">
                                <span class="material-symbols-outlined text-primary">photo_size_select_large</span>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] uppercase font-bold text-slate-500">Target Resolution</p>
                                <p class="text-sm font-mono font-bold text-white drop-shadow-md" id="newRes">0 x 0</p>
                            </div>
                        </div>
                    </div>

                    <!-- Canvas Area -->
                    <div
                        class="flex-1 bg-[#050508] rounded-xl border border-white/5 p-4 flex items-center justify-center relative shadow-inner overflow-auto">
                        <!-- Checkerboard Pattern for transparent bg -->
                        <div class="absolute inset-0 opacity-[0.05]"
                            style="background-image: linear-gradient(45deg, #fff 25%, transparent 25%), linear-gradient(-45deg, #fff 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #fff 75%), linear-gradient(-45deg, transparent 75%, #fff 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;">
                        </div>

                        <canvas id="canvas"
                            class="max-w-full h-auto object-contain relative z-10 shadow-2xl transition-all duration-300"></canvas>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const dropZoneContainer = document.getElementById('dropZoneContainer');
        const workspaceContainer = document.getElementById('workspaceContainer');
        const sidebar = document.getElementById('sidebar');

        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const ratioToggle = document.getElementById('ratioToggle');

        const origResText = document.getElementById('origRes');
        const newResText = document.getElementById('newRes');

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');

        let originalImg = null;
        let originalName = '';
        let originalRatio = 1;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('active'); };
        dropZone.ondragleave = () => dropZone.classList.remove('active');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            originalName = file.name;
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImg = new Image();
                originalImg.onload = () => {
                    dropZoneContainer.style.display = 'none';
                    workspaceContainer.style.display = 'flex';
                    sidebar.style.display = 'flex';

                    originalRatio = originalImg.width / originalImg.height;
                    widthInput.value = originalImg.width;
                    heightInput.value = originalImg.height;
                    origResText.innerText = `${originalImg.width} x ${originalImg.height}px`;

                    updatePreview();
                };
                originalImg.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        widthInput.oninput = () => {
            if (ratioToggle.checked && originalImg) {
                heightInput.value = Math.round(widthInput.value / originalRatio);
            }
            updatePreview();
        };

        heightInput.oninput = () => {
            if (ratioToggle.checked && originalImg) {
                widthInput.value = Math.round(heightInput.value * originalRatio);
            }
            updatePreview();
        };

        function scaleBy(factor) {
            if (!originalImg) return;
            widthInput.value = Math.round(originalImg.width * factor);
            heightInput.value = Math.round(originalImg.height * factor);
            updatePreview();
        }

        function updatePreview() {
            if (!originalImg) return;
            const w = parseInt(widthInput.value) || 1;
            const h = parseInt(heightInput.value) || 1;

            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(originalImg, 0, 0, w, h);
            newResText.innerText = `${w} x ${h}px`;
        }

        downloadBtn.onclick = () => {
            if (!originalImg) return;
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png', 1.0);
            link.download = `resized-${originalName}`;
            link.click();

            // Visual feedback
            const origHtml = downloadBtn.innerHTML;
            downloadBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]">check_circle</span> Downloaded!';
            downloadBtn.classList.add('bg-[#34d399]', 'border-[#34d399]', 'shadow-[#34d399]/30');
            setTimeout(() => {
                downloadBtn.innerHTML = origHtml;
                downloadBtn.classList.remove('bg-[#34d399]', 'border-[#34d399]', 'shadow-[#34d399]/30');
            }, 2000);
        };
    </script>
</body>

</html>
