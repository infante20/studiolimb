<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col">

            </div>
        </header>

        <main class="relative z-10 flex flex-1 overflow-hidden px-4 pb-4 justify-center">

            <div
                class="w-full max-w-4xl glass-panel rounded-2xl flex flex-col relative overflow-hidden bg-[#0a0a0f]/90 shadow-2xl">

                <!-- Header Area -->
                <div class="px-6 pt-6 md:px-12 md:pt-10 flex flex-col items-start gap-1">

                    <p class="text-sm font-medium text-slate-400">Convierte imágenes de forma local y segura.</p>
                </div>

                <!-- Main Content Area -->
                <div class="flex-1 overflow-y-auto p-6 md:p-12">

                    <!-- Drop Zone -->
                    <div class="w-full drop-zone rounded-2xl flex flex-col items-center justify-center bg-[#050508]/50 gap-3 py-10 mb-8 cursor-pointer group"
                        id="dropZone">
                        <div
                            class="w-16 h-16 rounded-full bg-white/5 text-slate-300 flex items-center justify-center border border-white/10 mb-2 group-hover:bg-primary/20 group-hover:text-primary group-hover:border-primary/30 transition-all">
                            <span class="material-symbols-outlined text-[32px]">add_a_photo</span>
                        </div>
                        <h3
                            class="text-xl font-bold tracking-tight text-white group-hover:text-primary transition-colors">
                            Select or drop images</h3>
                        <p class="text-xs font-semibold text-slate-500">Soporta múltiples archivos</p>
                        <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
                    </div>

                    <!-- File List -->
                    <div class="space-y-4" id="fileList">
                        <!-- Items injected here -->
                    </div>

                </div>
            </div>

        </main>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('active'); };
        dropZone.ondragleave = () => dropZone.classList.remove('active');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            handleFiles(e.dataTransfer.files);
        };

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                addFileItem(file);
            });
        }

        function addFileItem(file) {
            const id = Math.random().toString(36).substr(2, 9);
            const item = document.createElement('div');
            item.className = 'bg-[#050508] border border-white/10 p-4 rounded-xl flex flex-col md:flex-row items-center gap-4 hover:border-white/20 transition-colors shadow-lg';
            item.id = id;

            item.innerHTML = `
                <div class="w-12 h-12 rounded-lg bg-white/5 flex items-center justify-center text-slate-300 border border-white/10 shrink-0">
                    <span class="material-symbols-outlined">image</span>
                </div>
                
                <div class="flex-1 min-w-0 text-center md:text-left w-full">
                    <div class="text-sm font-bold text-slate-200 truncate pr-4" title="${file.name}">${file.name}</div>
                    <div class="text-[10px] uppercase font-bold tracking-widest text-slate-500 mt-1 flex items-center justify-center md:justify-start gap-2">
                        <span>${formatSize(file.size)}</span>
                        <div class="w-1 h-1 rounded-full bg-slate-600"></div>
                        <span class="text-primary">${file.type.split('/')[1].toUpperCase()}</span>
                    </div>
                </div>

                <div class="flex items-center gap-3 w-full md:w-auto mt-2 md:mt-0">
                    <div class="relative flex-1 md:w-36">
                        <select id="select-${id}" class="w-full bg-[#1a1a24] border border-white/10 rounded-lg py-2 pl-3 pr-8 text-xs font-bold text-slate-200 outline-none focus:border-primary">
                            <option value="image/jpeg">a JPEG</option>
                            <option value="image/png">a PNG</option>
                            <option value="image/webp">a WebP</option>
                        </select>
                    </div>
                    <button class="btn-convert shrink-0 bg-white/10 hover:bg-white/20 border border-white/10 text-white px-5 py-2 rounded-lg text-xs font-bold transition-all shadow-md flex items-center gap-2" onclick="convertFile('${id}', '${file.name}')">
                        <span class="material-symbols-outlined text-[16px]">transform</span> Convertir
                    </button>
                </div>
            `;

            // Insert at top
            if (fileList.firstChild) fileList.insertBefore(item, fileList.firstChild);
            else fileList.appendChild(item);

            item._file = file;
        }

        function convertFile(id, originalName) {
            const item = document.getElementById(id);
            const file = item._file;
            const targetFormat = document.getElementById(`select-${id}`).value;
            const btn = item.querySelector('.btn-convert');

            // Loading state
            btn.innerHTML = '<span class="material-symbols-outlined text-[16px] animate-spin">refresh</span> Procesando';
            btn.disabled = true;
            btn.className = 'shrink-0 bg-primary/20 border border-primary/30 text-primary px-5 py-2 rounded-lg text-xs font-bold flex items-center gap-2 opacity-80 cursor-wait';

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    canvas.toBlob((blob) => {
                        const extension = targetFormat.split('/')[1];
                        const newName = originalName.split('.')[0] + '.' + extension;

                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = newName;
                        link.click();

                        // Success state
                        btn.innerHTML = '<span class="material-symbols-outlined text-[16px]">download_done</span> Guardado';
                        btn.className = 'shrink-0 bg-success/20 border border-success/30 text-success px-5 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-2 shadow-lg shadow-success/10 cursor-default';

                        setTimeout(() => {
                            btn.innerHTML = '<span class="material-symbols-outlined text-[16px]">transform</span> Convertir Again';
                            btn.className = 'shrink-0 bg-white/10 hover:bg-white/20 border border-white/10 text-white px-5 py-2 rounded-lg text-xs font-bold transition-all shadow-md flex items-center gap-2 cursor-pointer';
                            btn.disabled = false;
                        }, 3000);
                    }, targetFormat, 0.95);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }
    </script>
