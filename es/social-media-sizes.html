<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>StudioLimb | Tamaños Redes Sociales</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7c5cfc",
                        "background-light": "#f8f6f6",
                        "background-dark": "#050508",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                    },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .canvas-container {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
        }

        .platform-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .platform-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(124, 92, 252, 0.3);
        }

        .toast {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.hide {
            transform: translateY(100px);
            opacity: 0;
            pointer-events: none;
        }
    </style>
    <link rel="canonical" href="https://www.studiolimb.com/es/social-media-sizes.html" />
    <meta name="description" content="Guía actualizada de tamaños para imágenes en Instagram, TikTok, LinkedIn, Twitter/X.">
    <link rel="alternate" hreflang="x-default" href="https://www.studiolimb.com/social-media-sizes.html" />
    <link rel="alternate" hreflang="en" href="https://www.studiolimb.com/social-media-sizes.html" />
    <link rel="alternate" hreflang="es" href="https://www.studiolimb.com/es/social-media-sizes.html" />
    <link rel="alternate" hreflang="fr" href="https://www.studiolimb.com/fr/social-media-sizes.html" />
    <link rel="alternate" hreflang="hi" href="https://www.studiolimb.com/hi/social-media-sizes.html" />
    <link rel="alternate" hreflang="pt-BR" href="https://www.studiolimb.com/pt/social-media-sizes.html" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://studiolimb.com/es/social-media-sizes.html" />
    <meta property="og:title" content="Social Media Image Sizes 2026 — Complete Reference Sheet" />
    <meta property="og:description" content="Up-to-date reference for image dimensions on Instagram, Facebook, Twitter/X, LinkedIn, YouTube and TikTok for 2026." />
    <meta property="og:site_name" content="StudioLimb" />
    <meta property="og:locale" content="es_ES" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Social Media Image Sizes 2026 — Complete Reference Sheet" />
    <meta name="twitter:description" content="Up-to-date reference for image dimensions on Instagram, Facebook, Twitter/X, LinkedIn, YouTube and TikTok for 2026." />
    <meta name="twitter:site" content="@studiolimb" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Social Media Image Sizes 2026",
      "description": "Up-to-date reference for image dimensions on Instagram, Facebook, Twitter/X, LinkedIn, YouTube and TikTok for 2026.",
      "url": "https://studiolimb.com/es/social-media-sizes.html",
      "applicationCategory": "WebApplication",
      "operatingSystem": "All",
      "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"},
      "featureList": "social media image sizes, instagram image size, facebook image dimensions, social media guide"
    }
    </script>
</head>

<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col">
        <!-- Main Background Canvas -->
        <div class="absolute inset-0 z-0 canvas-container"></div>

        <!-- Top Navigation Bar -->
        <header class="relative z-20 flex items-center justify-between px-6 py-4 glass-panel m-4 rounded-xl shadow-2xl">
            <div class="flex items-center gap-3">
                <div
                    class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined">auto_awesome_mosaic</span>
                </div>
                <div>
                    <h2 class="text-lg font-bold leading-tight tracking-tight">StudioLimb</h2>
                    <p class="text-[10px] uppercase tracking-widest font-semibold opacity-60">Media Suite</p>
                </div>
            </div>
            <div
                class="text-[10px] uppercase tracking-widest font-bold text-primary bg-primary/10 py-1 px-3 rounded-full border border-primary/20">
                Updated for 2026
            </div>
        </header>

        <main class="relative z-10 flex flex-1 overflow-hidden px-4 pb-4">

            <div
                class="w-full glass-panel rounded-2xl flex flex-col relative overflow-hidden bg-[#0a0a0f]/90 shadow-2xl">

                <!-- Inner Layout -->
                <div class="flex-1 flex flex-col overflow-y-auto w-full max-w-7xl mx-auto p-6 md:p-12 relative">

                    <div class="mb-8 flex flex-col items-start gap-1 w-full border-b border-white/5 pb-6">
                        <h1 class="text-xl font-bold mb-1">Social Media Size Guide</h1>
                        <p class="text-sm font-medium text-slate-400">Encuentra las medidas perfectas</p>
                    </div>

                    <!-- Filter Tabs -->
                    <div class="flex gap-2 overflow-x-auto scrollbar-hide mb-8 justify-center pb-2" id="tabs">
                        <button
                            class="px-5 py-2 rounded-full text-xs font-bold bg-primary text-white transition-all shadow-md shadow-primary/20 tab-button"
                            onclick="filterCategory('all', this)">Todas</button>
                        <button
                            class="px-5 py-2 rounded-full text-xs font-bold bg-white/5 text-slate-300 hover:bg-white/10 hover:text-white transition-all border border-white/10 tab-button"
                            onclick="filterCategory('instagram', this)">Instagram</button>
                        <button
                            class="px-5 py-2 rounded-full text-xs font-bold bg-white/5 text-slate-300 hover:bg-white/10 hover:text-white transition-all border border-white/10 tab-button"
                            onclick="filterCategory('tiktok', this)">TikTok</button>
                        <button
                            class="px-5 py-2 rounded-full text-xs font-bold bg-white/5 text-slate-300 hover:bg-white/10 hover:text-white transition-all border border-white/10 tab-button"
                            onclick="filterCategory('linkedin', this)">LinkedIn</button>
                        <button
                            class="px-5 py-2 rounded-full text-xs font-bold bg-white/5 text-slate-300 hover:bg-white/10 hover:text-white transition-all border border-white/10 tab-button"
                            onclick="filterCategory('twitter', this)">Twitter/X</button>
                    </div>

                    <!-- Platform Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="grid">
                        <!-- Filled by JS -->
                    </div>

                </div>
            </div>

        </main>
    </div>

    <!-- Toast Notification -->
    <div class="fixed bottom-8 left-1/2 z-50 flex items-center gap-2 bg-white text-black px-6 py-3 rounded-full font-bold shadow-2xl toast hide"
        id="toast">
        <span class="material-symbols-outlined text-[18px]">content_copy</span> ¡Tamaño Copiado!
    </div>

    <script>
        const platforms = [
            {
                name: 'Instagram', id: 'instagram', icon: 'photo_camera', color: 'bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600', text: 'text-white',
                sizes: [
                    { label: 'Square Post', dim: '1080 x 1080', ratio: '1:1' },
                    { label: 'Portrait Post', dim: '1080 x 1350', ratio: '4:5' },
                    { label: 'Landscape Post', dim: '1080 x 566', ratio: '1.91:1' },
                    { label: 'Story / Reel', dim: '1080 x 1920', ratio: '9:16' }
                ]
            },
            {
                name: 'TikTok', id: 'tiktok', icon: 'music_note', color: 'bg-black border border-white/20', text: 'text-white',
                sizes: [
                    { label: 'Video / Story', dim: '1080 x 1920', ratio: '9:16' },
                    { label: 'Profile Picture', dim: '200 x 200', ratio: '1:1' },
                    { label: 'Carousel Image', dim: '1080 x 1920', ratio: '9:16' }
                ]
            },
            {
                name: 'LinkedIn', id: 'linkedin', icon: 'business_center', color: 'bg-[#0077b5]', text: 'text-white',
                sizes: [
                    { label: 'Post Image', dim: '1200 x 627', ratio: '1.91:1' },
                    { label: 'Square Image', dim: '1080 x 1080', ratio: '1:1' },
                    { label: 'Cover Image', dim: '1584 x 396', ratio: '4:1' },
                    { label: 'Logo', dim: '400 x 400', ratio: '1:1' }
                ]
            },
            {
                name: 'Twitter / X', id: 'twitter', icon: 'close', color: 'bg-black border border-white/20', text: 'text-white',
                sizes: [
                    { label: 'Post Image', dim: '1600 x 900', ratio: '16:9' },
                    { label: 'Square Image', dim: '1080 x 1080', ratio: '1:1' },
                    { label: 'Header Card', dim: '1500 x 500', ratio: '3:1' },
                    { label: 'Profile Picture', dim: '400 x 400', ratio: '1:1' }
                ]
            },
            {
                name: 'Facebook', id: 'facebook', icon: 'thumb_up', color: 'bg-[#1877F2]', text: 'text-white',
                sizes: [
                    { label: 'Post Image', dim: '1200 x 630', ratio: '1.91:1' },
                    { label: 'Square Feed', dim: '1080 x 1080', ratio: '1:1' },
                    { label: 'Cover Photo', dim: '851 x 315', ratio: '2.7:1' },
                    { label: 'Story', dim: '1080 x 1920', ratio: '9:16' }
                ]
            },
            {
                name: 'Pinterest', id: 'pinterest', icon: 'push_pin', color: 'bg-[#E60023]', text: 'text-white',
                sizes: [
                    { label: 'Standard Pin', dim: '1000 x 1500', ratio: '2:3' },
                    { label: 'Square Pin', dim: '1000 x 1000', ratio: '1:1' },
                    { label: 'Long Pin', dim: '1000 x 2100', ratio: '1:2.1' },
                    { label: 'Board Cover', dim: '600 x 600', ratio: '1:1' }
                ]
            }
        ];

        function render(filterId = 'all') {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            platforms.forEach(p => {
                if (filterId !== 'all' && p.id !== filterId) return;

                const card = document.createElement('div');
                card.className = 'platform-card bg-[#050508]/80 backdrop-blur-md border border-white/10 rounded-2xl p-6 relative overflow-hidden group';

                // Subtle glow
                card.innerHTML += `<div class="absolute -top-10 -right-10 w-32 h-32 ${p.color} blur-[60px] opacity-20 group-hover:opacity-40 transition-opacity pointer-events-none"></div>`;

                let sizesHtml = p.sizes.map(s => {
                    const rW = parseFloat(s.ratio.split(':')[0]);
                    const rH = parseFloat(s.ratio.split(':')[1]);
                    return `
                        <div class="bg-white/5 hover:bg-white/10 border border-white/5 rounded-xl p-4 transition-colors flex items-center justify-between group/item cursor-pointer" onclick="copy('${s.dim}')">
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-slate-200">${s.label}</span>
                                <span class="text-[10px] uppercase font-bold tracking-widest text-slate-500">${s.ratio}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="font-mono text-sm font-bold text-primary group-hover/item:text-white transition-colors tracking-tight">${s.dim.replace(' ', '').replace(' ', '')}</span>
                                <div class="w-8 h-8 rounded shrink-0 bg-[#1a1a24] border border-white/20 flex flex-col items-center justify-center relative overflow-hidden">
                                    <div class="bg-primary/50 absolute" style="aspect-ratio: ${rW}/${rH}; height: ${rH > rW ? '70%' : 'auto'}; width: ${rW >= rH ? '70%' : 'auto'}; border-radius: 1px;"></div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                card.innerHTML += `
                    <div class="flex items-center gap-4 mb-6 relative z-10">
                        <div class="w-12 h-12 rounded-xl flex items-center justify-center shadow-lg ${p.color} ${p.text}">
                            <span class="material-symbols-outlined">${p.icon}</span>
                        </div>
                        <h2 class="text-xl font-bold tracking-tight">${p.name}</h2>
                    </div>
                    <div class="flex flex-col gap-2 relative z-10">
                        ${sizesHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterCategory(id, btnElement) {
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.className = 'px-5 py-2 rounded-full text-xs font-bold bg-white/5 text-slate-300 hover:bg-white/10 hover:text-white transition-all border border-white/10 tab-button';
            });
            btnElement.className = 'px-5 py-2 rounded-full text-xs font-bold bg-primary text-white transition-all shadow-md shadow-primary/20 tab-button';
            render(id);
        }

        function copy(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('hide');
                toast.classList.add('show');

                setTimeout(() => {
                    toast.classList.remove('show');
                    toast.classList.add('hide');
                }, 2000);
            });
        }

        render();
    </script>
    <script src="../shared.js"></script>
</body>

</html>
